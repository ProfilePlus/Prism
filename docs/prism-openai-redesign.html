<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prism — 完整交互原型</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --c-void: #000000;
    --c-canvas: #ffffff;
    --c-fog: #e5e7eb;
    --c-chalk: #f1f1f1;
    --c-graphite: #666666;
    --c-ash: #8f8f8f;
    --c-hair: rgba(0, 0, 0, 0.06);
    --c-hover: rgba(0, 0, 0, 0.04);
    --c-selection: rgba(0, 0, 0, 0.08);

    --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

    --r-card: 6.08px;
    --r-pill: 9999px;
    --r-soft: 40px;
    --r-link: 4px;

    --sidebar-w: 260px;

    --shadow-faint: rgba(0, 0, 0, 0.02) 0 4px 6px 0, rgba(0, 0, 0, 0.05) 0 0 2px 0;
    --shadow-flyout: rgba(0, 0, 0, 0.08) 0 16px 32px, rgba(0, 0, 0, 0.04) 0 4px 8px, rgba(0, 0, 0, 0.06) 0 0 0 1px;
    --shadow-float: rgba(0, 0, 0, 0.12) 0 8px 24px, rgba(0, 0, 0, 0.08) 0 2px 6px;
  }

  body.dark {
    --c-void: #ffffff;
    --c-canvas: #0a0a0a;
    --c-fog: #1f1f1f;
    --c-chalk: #1a1a1a;
    --c-graphite: #a0a0a0;
    --c-ash: #6a6a6a;
    --c-hair: rgba(255, 255, 255, 0.06);
    --c-hover: rgba(255, 255, 255, 0.05);
    --c-selection: rgba(255, 255, 255, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: var(--font-sans);
    background: var(--c-canvas);
    color: var(--c-void);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    font-feature-settings: "calt", "liga";
  }

  button { font-family: inherit; }

  /* ========== 窗口外壳 ========== */
  .window {
    height: 100vh;
    display: grid;
    grid-template-rows: 36px 40px 1fr 28px;
    background: var(--c-canvas);
    transition: filter 200ms ease;
  }
  .window.focus-mode { filter: none; }
  .window.focus-mode .sidebar,
  .window.focus-mode .menubar,
  .window.focus-mode .titlebar {
    opacity: 0.25;
    transition: opacity 240ms ease;
  }
  .window.focus-mode .sidebar:hover,
  .window.focus-mode .menubar:hover,
  .window.focus-mode .titlebar:hover { opacity: 1; }

  /* ========== 标题栏 ========== */
  .titlebar {
    display: flex;
    align-items: center;
    padding-left: 16px;
    border-bottom: 1px solid var(--c-fog);
    user-select: none;
  }
  .titlebar-brand { display: flex; align-items: center; gap: 10px; }
  .titlebar-brand .logo {
    width: 16px; height: 16px; border-radius: 2px;
    background: var(--c-void); color: var(--c-canvas);
    display: grid; place-items: center;
    font-size: 10px; font-weight: 700;
  }
  .titlebar-title { font-size: 13px; font-weight: 500; }
  .titlebar-title .doc-name { color: var(--c-void); }
  .titlebar-title .dirty-dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--c-void);
    margin-left: 6px; vertical-align: middle;
  }
  .titlebar-title .sep { color: var(--c-ash); margin: 0 8px; }
  .titlebar-title .app { color: var(--c-graphite); }

  .titlebar-controls { margin-left: auto; display: flex; }
  .tb-btn {
    width: 44px; height: 36px;
    display: grid; place-items: center;
    border: none; background: transparent;
    color: var(--c-graphite); cursor: pointer;
    transition: background 120ms ease, color 120ms ease;
  }
  .tb-btn:hover { background: var(--c-chalk); color: var(--c-void); }
  .tb-btn.close:hover { background: #e81123; color: #fff; }
  .tb-btn svg { width: 12px; height: 12px; stroke-width: 1.3; }

  /* ========== 菜单栏 ========== */
  .menubar {
    display: flex; align-items: center;
    padding: 0 8px 0 12px;
    border-bottom: 1px solid var(--c-fog);
    gap: 2px;
    position: relative;
  }
  .menu-item {
    padding: 5px 10px; font-size: 13px; font-weight: 500;
    color: var(--c-void); background: transparent; border: none;
    border-radius: var(--r-link); cursor: pointer;
    transition: background 120ms ease;
  }
  .menu-item:hover, .menu-item.open { background: var(--c-chalk); }
  .menubar-spacer { flex: 1; }

  .menubar-actions { display: flex; align-items: center; gap: 8px; margin-left: 10px; }
  .pill-ghost {
    padding: 6px 13px; font-size: 12px; font-weight: 500;
    color: var(--c-void); background: transparent;
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: var(--r-pill); cursor: pointer;
    transition: background 120ms ease;
    display: inline-flex; align-items: center; gap: 6px;
  }
  body.dark .pill-ghost { border-color: rgba(255,255,255,0.18); }
  .pill-ghost:hover { background: var(--c-chalk); }
  .pill-ghost svg { width: 11px; height: 11px; }

  .pill-filled {
    padding: 7px 15px; font-size: 12px; font-weight: 500;
    color: var(--c-canvas); background: var(--c-void);
    border: 1px solid var(--c-void);
    border-radius: var(--r-pill); cursor: pointer;
    box-shadow: var(--shadow-faint);
    display: inline-flex; align-items: center; gap: 6px;
    transition: opacity 120ms ease;
  }
  .pill-filled:hover { opacity: 0.85; }
  .pill-filled:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ========== 菜单下拉 ========== */
  .menu-dropdown {
    position: absolute; top: 100%; left: 0;
    min-width: 280px;
    background: var(--c-canvas);
    border: 1px solid var(--c-fog);
    border-radius: var(--r-card);
    box-shadow: var(--shadow-flyout);
    padding: 6px;
    z-index: 2000;
    animation: dd-in 140ms ease;
  }
  @keyframes dd-in {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .dd-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: var(--r-link);
    font-size: 13px; color: var(--c-void);
    cursor: pointer; user-select: none;
  }
  .dd-item:hover, .dd-item.hover { background: var(--c-chalk); }
  .dd-item.disabled { color: var(--c-ash); cursor: not-allowed; }
  .dd-item.disabled:hover { background: transparent; }
  .dd-item.danger { color: #c0392b; }
  body.dark .dd-item.danger { color: #ff6b5e; }
  .dd-item.danger:hover { background: rgba(192, 57, 43, 0.08); }
  .dd-item .label { flex: 1; }
  .dd-item .shortcut { font-family: var(--font-mono); font-size: 11px; color: var(--c-graphite); }
  .dd-item .chev { color: var(--c-ash); font-size: 10px; }
  .dd-check { width: 14px; display: inline-grid; place-items: center; color: var(--c-void); }
  .dd-sep { height: 1px; background: var(--c-fog); margin: 4px 6px; }

  .submenu-popover {
    position: absolute; left: 100%; top: -6px;
    min-width: 220px;
    background: var(--c-canvas);
    border: 1px solid var(--c-fog);
    border-radius: var(--r-card);
    box-shadow: var(--shadow-flyout);
    padding: 6px;
    animation: dd-in 140ms ease;
  }

  /* ========== 主体 ========== */
  .body {
    display: grid;
    grid-template-columns: auto 1fr;
    overflow: hidden;
    min-height: 0;
  }

  /* 侧栏 */
  .sidebar {
    width: var(--sidebar-w);
    box-shadow: 1px 0 0 var(--c-fog);
    display: flex; flex-direction: column; overflow: hidden;
    transition: width 200ms ease, box-shadow 200ms ease;
    flex-shrink: 0;
  }
  .sidebar.collapsed { width: 0; box-shadow: none; }

  .sidebar-tabs {
    display: flex; padding: 12px 16px 0; gap: 20px;
    border-bottom: 1px solid var(--c-fog);
  }
  .sidebar-tab {
    padding: 8px 0; font-size: 13px; font-weight: 500;
    color: var(--c-graphite); background: transparent; border: none;
    border-bottom: 2px solid transparent; cursor: pointer;
    transition: color 120ms ease, border-color 120ms ease;
    margin-bottom: -1px;
  }
  .sidebar-tab:hover { color: var(--c-void); }
  .sidebar-tab.active {
    color: var(--c-void); border-bottom-color: var(--c-void); font-weight: 600;
  }

  .sidebar-search { padding: 12px 14px 6px; }
  .search-input {
    width: 100%; padding: 7px 14px 7px 34px;
    font-family: var(--font-sans); font-size: 12px;
    color: var(--c-void); background: transparent;
    border: 1px solid var(--c-fog);
    border-radius: var(--r-pill); outline: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='13' height='13' viewBox='0 0 24 24' fill='none' stroke='%238f8f8f' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.35-4.35'/></svg>");
    background-repeat: no-repeat; background-position: 13px center;
    transition: border-color 120ms ease;
  }
  .search-input:focus { border-color: var(--c-void); }
  .search-input::placeholder { color: var(--c-ash); }

  .sort-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 16px 4px; font-size: 11px; color: var(--c-ash);
    white-space: nowrap;
  }
  .sort-row .sort-btn {
    display: inline-flex; align-items: center; gap: 4px;
    background: transparent; border: none; color: var(--c-graphite);
    font-size: 11px; padding: 4px 8px; border-radius: var(--r-pill);
    cursor: pointer; font-weight: 500;
    white-space: nowrap;
  }
  .sort-row .sort-btn:hover { background: var(--c-chalk); color: var(--c-void); }

  .file-tree { flex: 1; overflow-y: auto; padding: 6px 8px 12px; min-height: 0; }
  .tree-section-label {
    font-size: 10px; font-weight: 600; color: var(--c-ash);
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 10px 10px 6px;
  }
  .tree-row {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 8px; border-radius: var(--r-link);
    cursor: pointer; font-size: 13px; color: var(--c-void);
    user-select: none; line-height: 20px;
  }
  .tree-row:hover { background: var(--c-chalk); }
  .tree-row.active { background: var(--c-selection); font-weight: 500; }
  .tree-row .caret {
    width: 12px; height: 12px; display: inline-grid; place-items: center;
    color: var(--c-ash); flex-shrink: 0;
    transition: transform 150ms ease;
  }
  .tree-row .caret.expanded { transform: rotate(90deg); }
  .tree-row .icon {
    width: 14px; height: 14px; display: inline-grid; place-items: center;
    color: var(--c-graphite); flex-shrink: 0;
  }
  .tree-row .icon svg { width: 13px; height: 13px; stroke-width: 1.5; fill: none; stroke: currentColor; }
  .tree-row .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tree-row .dirty { width: 5px; height: 5px; border-radius: 50%; background: var(--c-void); }
  .tree-indent { padding-left: 24px; }
  .tree-rename {
    flex: 1; min-width: 0;
    height: 22px; padding: 0 6px;
    border: 1px solid var(--c-void); border-radius: var(--r-link);
    background: var(--c-canvas); color: var(--c-void);
    font: inherit; outline: none;
    box-shadow: 0 0 0 2px var(--c-hair);
  }

  /* 大纲 */
  .outline { padding: 12px 8px; overflow-y: auto; }
  .outline-item {
    padding: 5px 10px; border-radius: var(--r-link);
    font-size: 13px; color: var(--c-void);
    cursor: pointer; user-select: none;
  }
  .outline-item:hover { background: var(--c-chalk); }
  .outline-item.active { background: var(--c-selection); font-weight: 500; }
  .outline-item.h1 { font-weight: 600; }
  .outline-item.h2 { padding-left: 22px; color: var(--c-graphite); }
  .outline-item.h3 { padding-left: 34px; font-size: 12px; color: var(--c-graphite); }
  .outline-item.h4 { padding-left: 46px; font-size: 12px; color: var(--c-ash); }

  /* 搜索面板 */
  .search-panel { padding: 12px 14px; overflow-y: auto; }
  .search-panel-input { margin-bottom: 8px; }
  .search-options {
    display: flex; gap: 6px; margin-bottom: 10px;
  }
  .search-option {
    padding: 3px 9px; font-size: 11px; font-weight: 500;
    border: 1px solid var(--c-fog); border-radius: var(--r-pill);
    background: transparent; color: var(--c-graphite); cursor: pointer;
  }
  .search-option.active { background: var(--c-void); color: var(--c-canvas); border-color: var(--c-void); }
  .search-result {
    padding: 6px 10px; border-radius: var(--r-link);
    font-size: 12px; color: var(--c-graphite); cursor: pointer;
  }
  .search-result:hover { background: var(--c-chalk); }
  .search-result mark { background: var(--c-void); color: var(--c-canvas); padding: 0 2px; border-radius: 2px; }
  .search-result .path { display: block; font-size: 10px; color: var(--c-ash); margin-bottom: 2px; }

  /* ========== 编辑区 ========== */
  .main { display: grid; min-width: 0; overflow: hidden; }
  .main.split { grid-template-columns: 1fr 1px 1fr; }
  .main.edit, .main.preview { grid-template-columns: 1fr; }

  .pane { overflow-y: auto; min-width: 0; }
  .pane.editor {
    padding: 48px clamp(32px, 5vw, 80px);
    font-family: var(--font-mono); font-size: 14px; line-height: 1.75;
    color: var(--c-void);
  }
  .main.edit .pane.editor { padding: 64px clamp(40px, 8vw, 120px); }
  .pane.editor textarea {
    width: 100%; min-height: 100%; border: none; outline: none; resize: none;
    background: transparent; font: inherit; color: inherit; line-height: inherit;
    caret-color: var(--c-void);
  }
  .pane.editor textarea::selection { background: var(--c-selection); }
  .pane-divider { background: var(--c-fog); }

  .pane.preview {
    padding: 48px clamp(32px, 5vw, 80px);
    font-size: 17px; line-height: 1.65;
  }
  .main.preview .pane.preview { padding: 64px clamp(40px, 8vw, 120px); }
  .pane.preview h1 {
    font-size: 48px; font-weight: 600; line-height: 1.16;
    letter-spacing: -1.44px; margin: 0 0 24px;
  }
  .pane.preview h2 {
    font-size: 28px; font-weight: 600; line-height: 1.21;
    letter-spacing: -0.5px; margin: 48px 0 16px;
    padding-top: 16px; border-top: 1px solid var(--c-fog);
  }
  .pane.preview h3 {
    font-size: 22px; font-weight: 600; line-height: 1.26;
    margin: 32px 0 12px;
  }
  .pane.preview h4 {
    font-size: 16px; font-weight: 600; letter-spacing: 0;
    margin: 24px 0 8px; color: var(--c-void);
  }
  .pane.preview h5 {
    font-size: 13px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--c-graphite);
    margin: 20px 0 6px;
  }
  .pane.preview h6 {
    font-size: 12px; font-weight: 500; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--c-ash);
    margin: 16px 0 6px;
  }
  .pane.preview p { margin: 0 0 20px; color: var(--c-void); }
  .pane.preview p + p { margin-top: -8px; }
  .pane.preview strong { font-weight: 600; }
  .pane.preview em { font-style: italic; }
  .pane.preview a {
    color: var(--c-void);
    text-decoration: underline; text-decoration-thickness: 1px;
    text-underline-offset: 3px;
    border-radius: var(--r-link);
    transition: background 0.15s;
  }
  .pane.preview a:hover { background: var(--c-chalk); }

  /* 列表 */
  .pane.preview ul, .pane.preview ol { padding-left: 28px; margin: 0 0 20px; }
  .pane.preview li { margin-bottom: 6px; }
  .pane.preview ul > li::marker { color: var(--c-graphite); content: '— '; }
  .pane.preview ol { list-style: none; counter-reset: ol-count; padding-left: 0; }
  .pane.preview ol > li {
    counter-increment: ol-count;
    padding-left: 36px; position: relative;
  }
  .pane.preview ol > li::before {
    content: counter(ol-count);
    position: absolute; left: 0; top: 0;
    font-variant-numeric: tabular-nums;
    font-weight: 600; color: var(--c-void);
    width: 24px; text-align: right;
  }
  .pane.preview ul ul, .pane.preview ol ol, .pane.preview ul ol, .pane.preview ol ul {
    margin: 6px 0 6px;
  }
  .pane.preview li > input[type="checkbox"] {
    appearance: none; -webkit-appearance: none;
    width: 14px; height: 14px;
    border: 1.5px solid var(--c-void);
    border-radius: 3px;
    vertical-align: -2px; margin: 0 8px 0 -24px;
    position: relative; cursor: default;
  }
  .pane.preview li > input[type="checkbox"]:checked {
    background: var(--c-void);
  }
  .pane.preview li > input[type="checkbox"]:checked::after {
    content: ''; position: absolute;
    left: 3px; top: 0px;
    width: 4px; height: 8px;
    border: solid var(--c-canvas); border-width: 0 1.5px 1.5px 0;
    transform: rotate(45deg);
  }
  .pane.preview li:has(> input[type="checkbox"]:checked) {
    color: var(--c-ash); text-decoration: line-through;
  }

  /* 行内代码 */
  .pane.preview code {
    font-family: var(--font-mono); font-size: 0.86em;
    background: var(--c-chalk);
    padding: 1px 6px; border-radius: 4px;
    border: 1px solid var(--c-fog);
    color: var(--c-void);
  }
  body.dark .pane.preview code { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); }

  /* 代码块 */
  .pane.preview pre.code-block {
    background: var(--c-canvas);
    border: 1px solid var(--c-fog);
    border-radius: var(--r-card);
    margin: 0 0 24px; padding: 0;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(0,0,0,0.02);
  }
  body.dark .pane.preview pre.code-block { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.1); }
  .pane.preview .code-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px;
    background: var(--c-chalk);
    border-bottom: 1px solid var(--c-fog);
    font-family: var(--font-mono); font-size: 11px;
    color: var(--c-graphite); letter-spacing: 0.04em;
  }
  body.dark .pane.preview .code-header { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); }
  .pane.preview .code-lang { text-transform: uppercase; font-weight: 600; }
  .pane.preview .code-copy {
    background: none; border: 0; cursor: pointer;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--c-ash); padding: 2px 6px; border-radius: 4px;
  }
  .pane.preview .code-copy:hover { color: var(--c-void); background: var(--c-canvas); }
  .pane.preview pre.code-block > code {
    display: block;
    background: none; border: 0; padding: 14px 16px;
    font-family: var(--font-mono); font-size: 13px; line-height: 1.7;
    overflow-x: auto;
    border-radius: 0;
    color: var(--c-void);
  }
  /* 向后兼容默认 pre */
  .pane.preview pre:not(.code-block) {
    background: var(--c-chalk); padding: 16px 20px;
    border-radius: var(--r-card);
    font-family: var(--font-mono); font-size: 13px; line-height: 1.6;
    overflow-x: auto; margin: 0 0 20px;
    border: 1px solid var(--c-fog);
  }
  .pane.preview pre:not(.code-block) code { background: none; padding: 0; border: 0; }

  /* blockquote */
  .pane.preview blockquote {
    margin: 0 0 24px;
    padding: 14px 20px 14px 22px;
    border-left: 3px solid var(--c-void);
    background: var(--c-chalk);
    border-radius: 0 var(--r-card) var(--r-card) 0;
    color: var(--c-graphite);
    font-style: italic;
  }
  body.dark .pane.preview blockquote { background: rgba(255,255,255,0.04); }
  .pane.preview blockquote p { margin: 0; color: inherit; }
  .pane.preview blockquote p + p { margin-top: 8px; }
  .pane.preview blockquote blockquote {
    margin: 10px 0 0;
    border-left-color: var(--c-graphite);
    background: var(--c-canvas);
  }
  body.dark .pane.preview blockquote blockquote { background: rgba(0,0,0,0.25); }

  /* 高亮 mark (== ==) */
  .pane.preview mark {
    background: linear-gradient(transparent 60%, rgba(255,224,102,0.7) 60%);
    color: var(--c-void); padding: 0 2px; border-radius: 1px;
  }
  body.dark .pane.preview mark { background: linear-gradient(transparent 60%, rgba(255,224,102,0.35) 60%); color: #fff; }

一种把留白视为最强元素的设计哲学,把所有色彩留给**用户内容**与*编辑性图像*。

## 为何如此

Prism 的写作界面应当消失。它是思想的画框,而非自身的舞台。我们遵守三条规则:

1. 黑色是唯一的色彩锚点。
2. 留白替代阴影。
3. 药丸与近方形卡片是仅有的两种形状语言。

  function flattenTree(nodes, depth = 0, out = []) {
    nodes.forEach(n => {
      out.push({ ...n, depth });
      if (n.type === 'folder' && n.expanded && n.children) flattenTree(n.children, depth + 1, out);
    });
    return out;

  function parseOutline(md) {
    const lines = md.split('\n');
    const items = [];
    lines.forEach((line, idx) => {
      const m = line.match(/^(#{1,4})\s+(.+)$/);
      if (m) items.push({ level: m[1].length, text: m[2].trim(), line: idx });
    });
    return items;
  }

  function MenuDropdown({ items, onAction, onClose, subKey, setSubKey, checks }) {
    const [hoverIdx, setHoverIdx] = useState(-1);
    const click = (it) => {

      if (it.submenu) { setSubKey(it.submenu); return; }

      onClose();

      <div className="menu-dropdown" onMouseLeave={() => { setHoverIdx(-1); setSubKey(null); }}>
        {items.map((it, i) => {

          const isChecked = it.checkable && checks && checks[it.checkKey];
          return (
            <div key={i}
              className={'dd-item ' + (it.disabled ? 'disabled ' : '') + (hoverIdx === i ? 'hover ' : '')}
              onMouseEnter={() => { setHoverIdx(i); if (it.submenu) setSubKey(it.submenu); else setSubKey(null); }}

  function stripExt(name) { const i = name.lastIndexOf('.'); return i > 0 ? [name.slice(0, i), name.slice(i)] : [name, '']; }

  function RenameInput({ value, onCommit, onCancel }) {
    const [v, setV] = useState(value);
    const ref = useRef(null);
    useEffect(() => {
      if (ref.current) {

        const [stem] = stripExt(value);
        ref.current.setSelectionRange(0, stem.length);
      }
    }, []);
    return (
      <input ref={ref} className="tree-rename" value={v}
        onChange={e => setV(e.target.value)}
        onBlur={() => onCommit(v)}
        onClick={e => e.stopPropagation()}
        onKeyDown={e => {
          if (e.key === 'Enter') { e.preventDefault(); onCommit(v); }
          else if (e.key === 'Escape') { e.preventDefault(); onCancel(); }
        }}
      />
    );

      if (fileTreeMode === 'list') {
        // 文档列表:只展示文件,拍平
        const out = [];
        const walk = (nodes) => nodes.forEach(n => {
          if (n.type === 'folder') walk(n.children || []);
          else out.push({ ...n, depth: 0 });
        });
        walk(sortedTree);
        return out;
      }
      return flattenTree(sortedTree);
    }, [sortedTree, fileTreeMode]);

    const toggleFolder = (id) => {
      const walk = (nodes) => nodes.map(n => n.id === id ? { ...n, expanded: !n.expanded } : n.children ? { ...n, children: walk(n.children) } : n);
      setTree(walk(tree));
    };

    return (

          <span>工作区</span>
          <button className="sort-btn" onClick={e => {
            const r = e.currentTarget.getBoundingClientRect();

    const [q, setQ] = useState('');
    const [caseSens, setCaseSens] = useState(false);
    const [whole, setWhole] = useState(false);
    const results = useMemo(() => {
      if (!q) return [];
      const lines = content.split('\n');
      const out = [];
      const needle = caseSens ? q : q.toLowerCase();
      lines.forEach((line, idx) => {
        const hay = caseSens ? line : line.toLowerCase();
        let matches = false;
        if (whole) matches = new RegExp('\\b' + needle.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b').test(hay);
        else matches = hay.includes(needle);
        if (matches) out.push({ line: idx + 1, text: line });
      });
      return out;
    }, [q, caseSens, whole, content]);
    return (
      <div className="search-panel">
        <div className="search-panel-input">
          <input className="search-input" placeholder="在文档中搜索" value={q} onChange={e => setQ(e.target.value)} autoFocus />

  function CommandPalette({ visible, onClose, onExecute }) {
    const [q, setQ] = useState('');
    const [idx, setIdx] = useState(0);
    const filtered = useMemo(() => {
      if (!q) return COMMANDS;
      const n = q.toLowerCase();
      return COMMANDS.filter(c => (c.label + ' ' + c.category + ' ' + (c.shortcut || '')).toLowerCase().includes(n));
    }, [q]);
    useEffect(() => { if (visible) { setQ(''); setIdx(0); } }, [visible]);
    useEffect(() => { setIdx(0); }, [q]);
    useEffect(() => {
      if (!visible) return;
      const on = (e) => {
        if (e.key === 'Escape') { e.preventDefault(); onClose(); }
        else if (e.key === 'ArrowDown') { e.preventDefault(); setIdx(i => Math.min(i + 1, filtered.length - 1)); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); setIdx(i => Math.max(i - 1, 0)); }
        else if (e.key === 'Enter') { e.preventDefault(); if (filtered[idx]) { onExecute(filtered[idx].id); onClose(); } }
      };
      window.addEventListener('keydown', on);
      return () => window.removeEventListener('keydown', on);
    }, [visible, idx, filtered, onClose, onExecute]);
    if (!visible) return null;
    return (
      <>
        <div className="cmdk-overlay" onClick={onClose} />
        <div className="cmdk">
          <div className="cmdk-search">
            <Icon.Search />
            <input className="cmdk-input" placeholder="输入命令或搜索…" value={q} onChange={e => setQ(e.target.value)} autoFocus />
            <span className="kbd">Esc</span>
          </div>
          <div className="cmdk-list">
            {filtered.length === 0 ? (
              <div className="cmdk-empty">未找到匹配的命令</div>
            ) : filtered.map((c, i) => (
              <div key={c.id} className={'cmdk-item ' + (i === idx ? 'selected' : '')}
                onMouseEnter={() => setIdx(i)}
                onClick={() => { onExecute(c.id); onClose(); }}>

            ))}
          </div>
        </div>
      </>
    );
  }

  // ====== 主应用 ======
  function App() {
    const [viewMode, setViewMode] = useState('split');
    const [themeMode, setThemeMode] = useState('light');
    const [sidebarVisible, setSidebarVisible] = useState(true);
    const [sidebarTab, setSidebarTab] = useState('files');
    const [focusMode, setFocusMode] = useState(false);
    const [alwaysOnTop, setAlwaysOnTop] = useState(false);
    const [content, setContent] = useState(SAMPLE_MD);
    const [isDirty, setIsDirty] = useState(false);
    const [saveStatus, setSaveStatus] = useState('saved');
    const [cursor, setCursor] = useState({ line: 1, col: 1 });
    const [tree, setTree] = useState(SAMPLE_TREE);
    const [sortMode, setSortMode] = useState('name');
    const [fileTreeMode, setFileTreeMode] = useState('tree');
    const [renamingId, setRenamingId] = useState(null);
    const [isSidebarZoneHover, setIsSidebarZoneHover] = useState(false);
    const [floatPos, setFloatPos] = useState(null);
    const [cmdOpen, setCmdOpen] = useState(false);
    const [shortcutOpen, setShortcutOpen] = useState(false);
    const [aboutOpen, setAboutOpen] = useState(false);
    const [settingsOpen, setSettingsOpen] = useState(false);
    const [ctxMenu, setCtxMenu] = useState(null);
    const [toasts, setToasts] = useState([]);
    const [activeLine, setActiveLine] = useState(0);
    const [settings, setSettings] = useState({ autoSave: true, typewriter: false, spellCheck: false, lineNumbers: false, softWrap: true });
    const [currentFile, setCurrentFile] = useState({ id: '1-2', name: '设计笔记.md', path: '/文档/设计笔记.md' });
    const textareaRef = useRef(null);

    // 主题切换 body class
    useEffect(() => {
      document.body.classList.toggle('dark', themeMode === 'dark');
    }, [themeMode]);

    // 字数统计
    const { wordCount, charCount } = useMemo(() => {
      const plain = content.replace(/[#*`_>\-\[\]\(\)]/g, '');
      const chinese = (plain.match(/[一-龥]/g) || []).length;
      const english = (plain.match(/[a-zA-Z]+/g) || []).length;
      return { wordCount: chinese + english, charCount: plain.replace(/\s/g, '').length };
    }, [content]);

    // 预览 HTML — 自定义 code block 包装 + 行内 == 高亮
    const previewHtml = useMemo(() => {
      if (!window.marked) return '';
      const escape = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      const renderer = new window.marked.Renderer();
      renderer.code = (code, info) => {
        const body = typeof code === 'string' ? code : (code && code.text) || '';
        const lang = (typeof info === 'string' ? info : (code && code.lang)) || 'text';
        return `<pre class="code-block"><div class="code-header"><span class="code-lang">${escape(lang)}</span><button class="code-copy" type="button">复制</button></div><code>${escape(body)}</code></pre>`;
      };
      const raw = window.marked.parse(content, { renderer, gfm: true, breaks: false });
      // 转换 ==xxx== 为 <mark>
      return raw.replace(/==([^=\n]+)==/g, '<mark>$1</mark>');
    }, [content]);

    // 自动保存模拟
    useEffect(() => {
      if (!isDirty) { setSaveStatus('saved'); return; }
      setSaveStatus('unsaved');
      if (!settings.autoSave) return;
      const t1 = setTimeout(() => setSaveStatus('saving'), 1500);
      const t2 = setTimeout(() => { setSaveStatus('saved'); setIsDirty(false); }, 2200);
      return () => { clearTimeout(t1); clearTimeout(t2); };
    }, [isDirty, content, settings.autoSave]);

    // Toast
    const pushToast = useCallback((text) => {
      const id = Date.now() + Math.random();
      setToasts(ts => [...ts, { id, text }]);
      setTimeout(() => setToasts(ts => ts.filter(t => t.id !== id)), 1800);
    }, []);

    // 树操作
    const uid = () => 'n' + Date.now().toString(36) + Math.floor(Math.random() * 1000);
    const addNode = (parentId, type) => {
      const name = type === 'folder' ? '新建文件夹' : '未命名.md';
      const newNode = { id: uid(), name, type, ...(type === 'folder' ? { expanded: true, children: [] } : {}) };
      const walk = (nodes) => {
        if (parentId === null) return [...nodes, newNode];
        return nodes.map(n => n.id === parentId
          ? { ...n, expanded: true, children: [...(n.children || []), newNode] }
          : n.children ? { ...n, children: walk(n.children) } : n);
      };
      setTree(t => walk(t));
      setTimeout(() => setRenamingId(newNode.id), 50);
    };
    const removeNode = (id) => {
      const walk = (nodes) => nodes.filter(n => n.id !== id).map(n => n.children ? { ...n, children: walk(n.children) } : n);
      setTree(t => walk(t));
    };
    const duplicateNode = (id) => {
      const walk = (nodes, list) => {
        const out = [];
        for (const n of nodes) {
          out.push(n.children ? { ...n, children: walk(n.children, list) } : n);
          if (n.id === id) {
            const dot = n.name.lastIndexOf('.');
            const copy = { ...n, id: uid(), name: dot > 0 ? n.name.slice(0, dot) + ' 副本' + n.name.slice(dot) : n.name + ' 副本' };
            out.push(copy);
          }
        }
        return out;
      };
      setTree(t => walk(t, null));
    };
    const renameNode = (id, newName) => {
      if (!newName || !newName.trim()) { setRenamingId(null); return; }
      const walk = (nodes) => nodes.map(n => n.id === id ? { ...n, name: newName.trim() } : n.children ? { ...n, children: walk(n.children) } : n);
      setTree(t => walk(t));
      setRenamingId(null);
    };

    // 文本格式化
    const handleFormat = useCallback((fmt) => {
      const ta = textareaRef.current;
      if (!ta) return;
      const { selectionStart: s, selectionEnd: e, value } = ta;
      const sel = value.slice(s, e);
      const wraps = { bold: ['**', '**'], italic: ['*', '*'], underline: ['<u>', '</u>'], strike: ['~~', '~~'], code: ['`', '`'], highlight: ['==', '=='], quote: ['> ', ''], link: ['[', '](url)'] };
      const w = wraps[fmt];
      if (!w) return;
      const newText = value.slice(0, s) + w[0] + sel + w[1] + value.slice(e);
      setContent(newText);
      setIsDirty(true);
      setFloatPos(null);
      setTimeout(() => {
        ta.focus();
        ta.setSelectionRange(s + w[0].length, s + w[0].length + sel.length);
      }, 0);
    }, []);

    // 选中文本显示浮动工具栏
    const handleSelection = useCallback(() => {
      const ta = textareaRef.current;
      if (!ta) return;
      const { selectionStart: s, selectionEnd: e } = ta;
      if (s === e) { setFloatPos(null); return; }
      const rect = ta.getBoundingClientRect();
      const lineHeight = 24.5;
      const lines = ta.value.slice(0, s).split('\n');
      const row = lines.length;
      const col = lines[lines.length - 1].length;
      // 估算位置,放在编辑区上方浮动
      const x = Math.min(Math.max(rect.left + 200, 180), window.innerWidth - 180);
      const y = Math.max(rect.top + row * lineHeight - ta.scrollTop - 50, 120);
      setFloatPos({ x, y });
    }, []);

    // 右键上下文菜单
    const openFileContext = (e, node) => {
      e.preventDefault();
      e.stopPropagation();
      const isDir = node.type === 'folder';
      const items = [];
      if (!isDir) items.push({ label: '打开', action: () => { setCurrentFile({ name: node.name, path: '/' + node.name }); pushToast('已打开 ' + node.name); } });
      items.push({ label: '在新窗口中打开', action: () => pushToast('新窗口打开 ' + node.name) });
      items.push({ type: 'sep' });
      items.push({ label: '新建文件', action: () => { addNode(isDir ? node.id : null, 'file'); pushToast('新建文件'); } });
      items.push({ label: '新建文件夹', action: () => { addNode(isDir ? node.id : null, 'folder'); pushToast('新建文件夹'); } });
      items.push({ type: 'sep' });
      items.push({ label: '搜索', action: () => { setSidebarTab('search'); setSidebarVisible(true); } });
      items.push({ type: 'sep' });
      items.push({ label: '文档列表', checkable: true, checked: fileTreeMode === 'list', action: () => setFileTreeMode('list') });
      items.push({ label: '文档树', checkable: true, checked: fileTreeMode === 'tree', action: () => setFileTreeMode('tree') });
      items.push({ type: 'sep' });
      items.push({ label: '按名称排序', checkable: true, checked: sortMode === 'name', action: () => setSortMode('name') });
      items.push({ label: '按修改时间排序', checkable: true, checked: sortMode === 'modified', action: () => setSortMode('modified') });
      items.push({ label: '按创建时间排序', checkable: true, checked: sortMode === 'created', action: () => setSortMode('created') });
      items.push({ label: '按大小排序', checkable: true, checked: sortMode === 'size', action: () => setSortMode('size') });
      items.push({ type: 'sep' });
      items.push({ label: '重命名', shortcut: 'F2', action: () => setRenamingId(node.id) });
      if (!isDir) items.push({ label: '创建副本', action: () => { duplicateNode(node.id); pushToast('副本已创建'); } });
      items.push({ label: '删除', danger: true, action: () => { removeNode(node.id); pushToast('已删除 ' + node.name); } });
      items.push({ type: 'sep' });
      items.push({ label: '属性', action: () => pushToast('查看属性') });
      items.push({ label: '复制文件路径', action: () => pushToast('路径已复制') });
      items.push({ label: '打开文件位置', action: () => pushToast('已在资源管理器打开') });
      setCtxMenu({ x: e.clientX, y: e.clientY, items });
    };

    const openBlankContext = (e) => {
      e.preventDefault();
      e.stopPropagation();
      setCtxMenu({ x: e.clientX, y: e.clientY, items: [
        { label: '在新窗口中打开', action: () => pushToast('新窗口') },
        { type: 'sep' },
        { label: '新建文件', action: () => { addNode(null, 'file'); pushToast('新建文件'); } },
        { label: '新建文件夹', action: () => { addNode(null, 'folder'); pushToast('新建文件夹'); } },
        { label: '搜索', action: () => { setSidebarTab('search'); setSidebarVisible(true); } },
        { type: 'sep' },
        { label: '文档列表', checkable: true, checked: fileTreeMode === 'list', action: () => setFileTreeMode('list') },
        { label: '文档树', checkable: true, checked: fileTreeMode === 'tree', action: () => setFileTreeMode('tree') },
        { type: 'sep' },
        { label: '复制文件路径', action: () => pushToast('路径已复制') },
        { label: '打开文件位置', action: () => pushToast('已定位') },
      ]});
    };

    const openFolderContext = (e) => {
      e.preventDefault();
      e.stopPropagation();
      setCtxMenu({ x: e.clientX, y: e.clientY, items: [
        { label: '在新窗口中打开', action: () => pushToast('新窗口') },
        { type: 'sep' },
        { label: '新建文件', action: () => { addNode(null, 'file'); pushToast('新建文件'); } },
        { label: '新建文件夹', action: () => { addNode(null, 'folder'); pushToast('新建文件夹'); } },
        { type: 'sep' },
        { label: '搜索', action: () => { setSidebarTab('search'); setSidebarVisible(true); } },
        { type: 'sep' },
        { label: '文档列表', checkable: true, checked: fileTreeMode === 'list', action: () => setFileTreeMode('list') },
        { label: '文档树', checkable: true, checked: fileTreeMode === 'tree', action: () => setFileTreeMode('tree') },
        { type: 'sep' },
        { label: '刷新', action: () => pushToast('已刷新') },
        { type: 'sep' },
        { label: '复制文件路径', action: () => pushToast('路径已复制') },
        { label: '打开文件位置', action: () => pushToast('已定位') },
      ]});
    };

    // 动作分发
    const handleAction = useCallback((action) => {
      switch (action) {
        case 'new': setContent(''); setIsDirty(false); pushToast('新建文档'); break;
        case 'open': pushToast('打开文件…'); break;
        case 'openFolder': pushToast('打开文件夹…'); break;
        case 'save': setSaveStatus('saving'); setTimeout(() => { setIsDirty(false); setSaveStatus('saved'); pushToast('已保存'); }, 300); break;
        case 'saveAs': pushToast('另存为…'); break;
        case 'sourceMode': setViewMode('edit'); break;
        case 'splitMode': setViewMode('split'); break;
        case 'previewMode': setViewMode('preview'); break;
        case 'focusMode': setFocusMode(v => !v); break;
        case 'typewriterMode': setSettings(s => ({ ...s, typewriter: !s.typewriter })); pushToast('打字机模式已切换'); break;
        case 'fullscreen': pushToast('全屏切换'); break;
        case 'alwaysOnTop': setAlwaysOnTop(v => !v); pushToast('窗口置顶已切换'); break;
        case 'toggleSidebar': setSidebarVisible(v => !v); break;
        case 'showOutline': setSidebarTab('outline'); setSidebarVisible(true); break;
        case 'showFiles': setSidebarTab('files'); setSidebarVisible(true); break;
        case 'showSearch': setSidebarTab('search'); setSidebarVisible(true); break;
        case 'showCmd': setCmdOpen(true); break;
        case 'showShortcuts': setShortcutOpen(true); break;
        case 'about': setAboutOpen(true); break;
        case 'preferences': setSettingsOpen(true); break;
        case 'themeLight': setThemeMode('light'); break;
        case 'themeDark': setThemeMode('dark'); break;
        case 'toggleTheme': setThemeMode(m => m === 'light' ? 'dark' : 'light'); break;
        case 'exportHtml': pushToast('导出为 HTML'); break;
        case 'exportPdf': pushToast('导出为 PDF'); break;
        case 'exportDocx': pushToast('导出为 Word'); break;
        case 'bold': handleFormat('bold'); break;
        case 'italic': handleFormat('italic'); break;
        case 'underline': handleFormat('underline'); break;
        case 'inlineCode': handleFormat('code'); break;
        case 'quote': handleFormat('quote'); break;
        case 'h1': case 'h2': case 'h3': case 'h4': case 'h5': case 'h6': pushToast(action.toUpperCase()); break;
        default: if (action && action.startsWith('recent:')) pushToast('打开 ' + action); else pushToast(action);
      }
    }, [handleFormat, pushToast]);

    // 全局快捷键
    useEffect(() => {
      const on = (e) => {
        const ctrl = e.ctrlKey || e.metaKey;
        if (ctrl && e.shiftKey && e.key.toLowerCase() === 'p') { e.preventDefault(); setCmdOpen(true); return; }
        if (ctrl && e.key === '/') { e.preventDefault(); setShortcutOpen(true); return; }
        if (ctrl && e.shiftKey && e.key.toLowerCase() === 'l') { e.preventDefault(); setSidebarVisible(v => !v); return; }
        if (e.key === 'F8') { e.preventDefault(); setFocusMode(v => !v); return; }
        if (e.key === 'F2' && currentFile.id) { e.preventDefault(); setRenamingId(currentFile.id); setSidebarTab('files'); setSidebarVisible(true); return; }
        if (ctrl && e.key.toLowerCase() === 's') { e.preventDefault(); handleAction('save'); return; }
        if (ctrl && e.key.toLowerCase() === 'n' && !e.shiftKey) { e.preventDefault(); handleAction('new'); return; }
      };
      window.addEventListener('keydown', on);
      return () => window.removeEventListener('keydown', on);
    }, [handleAction, currentFile.id]);

    // 点击外部关闭上下文菜单
    const onMainClick = () => { setCtxMenu(null); setFloatPos(null); };

    // 光标位置跟踪
    const onTextareaKey = () => {
      const ta = textareaRef.current;
      if (!ta) return;
      const before = ta.value.slice(0, ta.selectionStart);
      const lines = before.split('\n');
      setCursor({ line: lines.length, col: lines[lines.length - 1].length + 1 });
    };

    const rootName = '工作区';

    return (
      <div className={'window ' + (focusMode ? 'focus-mode' : '')} onClick={onMainClick}>
        <div className="proto-hint">Prism · OpenAI 风格交互原型</div>

        {/* 标题栏 */}
        <div className="titlebar">
          <div className="titlebar-brand">
            <div className="logo">P</div>
            <div className="titlebar-title">
              <span className="doc-name">{currentFile.name}</span>
              {isDirty && <span className="dirty-dot" title="未保存" />}
              <span className="sep">—</span>
              <span className="app">Prism</span>
            </div>
          </div>
          <div className="titlebar-controls">
            <button className="tb-btn" title="最小化" onClick={() => pushToast('最小化')}><Icon.Min /></button>
            <button className="tb-btn" title="最大化" onClick={() => pushToast('最大化')}><Icon.Max /></button>
            <button className="tb-btn close" title="关闭" onClick={() => pushToast('关闭')}><Icon.Close /></button>
          </div>
        </div>

        {/* 菜单栏 */}
        <MenuBar
          viewMode={viewMode} setViewMode={setViewMode}
          onAction={handleAction}
          focusMode={focusMode} alwaysOnTop={alwaysOnTop} sidebarVisible={sidebarVisible}
          themeMode={themeMode} isDirty={isDirty}
        />

        {/* 主体 */}
        <div className="body">
          <div className={'sidebar ' + (sidebarVisible ? '' : 'collapsed')}>
            {sidebarVisible && <Sidebar
              tab={sidebarTab} setTab={setSidebarTab}
              tree={tree} setTree={setTree}
              activePath={currentFile.id}
              onFileClick={(n) => { setCurrentFile({ id: n.id, name: n.name, path: '/' + n.name }); pushToast('打开 ' + n.name); }}
              onContext={openFileContext}
              onBlankContext={openBlankContext}
              content={content} activeLine={activeLine}
              onOutlineClick={(line) => setActiveLine(line)}
              sortMode={sortMode} setSortMode={setSortMode}
              fileTreeMode={fileTreeMode} setFileTreeMode={setFileTreeMode}
              renamingId={renamingId} setRenamingId={setRenamingId}
              renameNode={renameNode}
            />}
          </div>

          <div className={'main ' + viewMode}>
            {(viewMode === 'edit' || viewMode === 'split') && (
              <div className="pane editor">
                <textarea
                  ref={textareaRef}
                  spellCheck={settings.spellCheck}
                  value={content}
                  onChange={e => { setContent(e.target.value); setIsDirty(true); }}
                  onSelect={handleSelection}
                  onMouseUp={handleSelection}
                  onKeyUp={(e) => { onTextareaKey(); handleSelection(); }}
                  onBlur={() => setTimeout(() => setFloatPos(null), 200)}
                  style={{ minHeight: 600 }}
                />
              </div>
            )}
            {viewMode === 'split' && <div className="pane-divider" />}
            {(viewMode === 'preview' || viewMode === 'split') && (
              <div className="pane preview" dangerouslySetInnerHTML={{ __html: previewHtml }} />
            )}
          </div>
        </div>

        {/* 状态栏 */}
        <StatusBar
          sidebarVisible={sidebarVisible}
          isSidebarZoneHover={isSidebarZoneHover}
          setIsSidebarZoneHover={setIsSidebarZoneHover}
          onToggleSidebar={() => setSidebarVisible(v => !v)}
          viewMode={viewMode} setViewMode={setViewMode}
          wordCount={wordCount} charCount={charCount}
          cursor={cursor} saveStatus={saveStatus}
          focusMode={focusMode} onToggleFocus={() => setFocusMode(v => !v)}
          onExport={() => handleAction('exportHtml')}
          onToggleTheme={() => setThemeMode(m => m === 'light' ? 'dark' : 'light')}
          themeMode={themeMode}
          rootName={rootName}
          onFolderContext={openFolderContext}
          onNewFile={() => addNode(null, 'file')}
          fileTreeMode={fileTreeMode}
          onToggleFileTreeMode={() => setFileTreeMode(m => m === 'tree' ? 'list' : 'tree')}
        />

        {/* 浮层 */}
        <FloatingToolbar pos={floatPos} onFormat={handleFormat} />
        <CommandPalette visible={cmdOpen} onClose={() => setCmdOpen(false)} onExecute={handleAction} />
        <ShortcutPanel visible={shortcutOpen} onClose={() => setShortcutOpen(false)} />
        <AboutModal visible={aboutOpen} onClose={() => setAboutOpen(false)} />
        <SettingsModal visible={settingsOpen} onClose={() => setSettingsOpen(false)} settings={settings} setSettings={setSettings} />
        <ContextMenu menu={ctxMenu} onClose={() => setCtxMenu(null)} />
        <ToastArea toasts={toasts} />
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
