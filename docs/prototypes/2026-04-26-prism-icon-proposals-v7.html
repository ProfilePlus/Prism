<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism Icon Visibility Lab - Original Design, New Containers</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: #0a0a0a; 
            color: #fff; 
            font-family: system-ui, -apple-system, sans-serif;
        }
        .taskbar-preview {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            margin-top: 20px;
        }
        .proposal-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 30px;
            transition: all 0.3s;
        }
        .proposal-card:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 核心图标组件：保持 100% 原始几何逻辑
        const OriginalPrismIcon = ({ stroke = "white", strokeWidth = 1, scale = 0.8 }) => (
            <svg viewBox="0 0 100 100" fill="none" style={{ transform: `scale(${scale})` }}>
                <g stroke={stroke} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
                    <path d="M50 50 L50 20 L70 35 Z" transform="rotate(0 50 50)" />
                    <path d="M50 50 L50 20 L70 35 Z" transform="rotate(60 50 50)" />
                    <path d="M50 50 L50 20 L70 35 Z" transform="rotate(120 50 50)" />
                    <path d="M50 50 L50 20 L70 35 Z" transform="rotate(180 50 50)" />
                    <path d="M50 50 L50 20 L70 35 Z" transform="rotate(240 50 50)" />
                    <path d="M50 50 L50 20 L70 35 Z" transform="rotate(300 50 50)" />
                </g>
                <circle cx="50" cy="50" r="10" fill={stroke} opacity="0.1" />
            </svg>
        );

        const App = () => {
            return (
                <div className="p-10 max-w-6xl mx-auto">
                    <header className="mb-12 text-center">
                        <h1 className="text-3xl font-bold mb-3 tracking-tighter">PRISM 图标任务栏适配方案</h1>
                        <p className="text-zinc-500 text-sm italic">“ 保持 Segment Iris 原始几何形状 100% 不变 ”</p>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        
                        {/* 方案 1: 深邃背板 */}
                        <div className="proposal-card">
                            <h3 className="font-bold mb-4 flex items-center gap-2">
                                <span className="w-6 h-6 rounded-full bg-zinc-800 text-[10px] flex items-center justify-center">1</span>
                                深邃背板 (Dark Backplate)
                            </h3>
                            <p className="text-xs text-zinc-500 mb-6 leading-relaxed">利用纯黑至深灰渐变的圆角矩形承载原始图标。在浅色任务栏上提供绝对的轮廓清晰度。</p>
                            <div className="bg-black/40 p-8 rounded-xl flex justify-center">
                                <div className="w-24 h-24 bg-gradient-to-br from-zinc-800 to-black rounded-[22%] p-3 shadow-2xl border border-white/5">
                                    <OriginalPrismIcon scale={1} />
                                </div>
                            </div>
                            <div className="taskbar-preview"><div className="w-8 h-8 bg-black rounded p-1 shadow-lg"><OriginalPrismIcon scale={1} /></div></div>
                        </div>

                        {/* 方案 2: 电光渐变 */}
                        <div className="proposal-card">
                            <h3 className="font-bold mb-4 flex items-center gap-2">
                                <span className="w-6 h-6 rounded-full bg-blue-600 text-[10px] flex items-center justify-center">2</span>
                                电光渐变 (Vibrant Blue)
                            </h3>
                            <p className="text-xs text-zinc-500 mb-6 leading-relaxed">采用亮蓝色作为基底，通过色相冲突让白色线条具有发光感，大幅提升视线捕捉率。</p>
                            <div className="bg-black/40 p-8 rounded-xl flex justify-center">
                                <div className="w-24 h-24 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-[22%] p-3 shadow-2xl border border-white/10">
                                    <OriginalPrismIcon scale={1} />
                                </div>
                            </div>
                            <div className="taskbar-preview"><div className="w-8 h-8 bg-blue-500 rounded p-1 shadow-lg"><OriginalPrismIcon scale={1} /></div></div>
                        </div>

                        {/* 方案 3: 柔光光晕 */}
                        <div className="proposal-card">
                            <h3 className="font-bold mb-4 flex items-center gap-2">
                                <span className="w-6 h-6 rounded-full bg-purple-500 text-[10px] flex items-center justify-center">3</span>
                                柔光光晕 (Halo Aura)
                            </h3>
                            <p className="text-xs text-zinc-500 mb-6 leading-relaxed">无实心背板。在原始图标下方叠加一层紫色弥散阴影，既保留了图标的空灵感，又防止其在浅色背景消失。</p>
                            <div className="bg-white/10 p-8 rounded-xl flex justify-center relative">
                                <div className="w-24 h-24 relative">
                                    <div className="absolute inset-0 bg-purple-500 blur-2xl opacity-40"></div>
                                    <div className="relative z-10"><OriginalPrismIcon scale={1} /></div>
                                </div>
                            </div>
                            <div className="taskbar-preview"><div className="w-8 h-8 relative"><div className="absolute inset-0 bg-purple-500 blur-lg opacity-60"></div><OriginalPrismIcon scale={1} /></div></div>
                        </div>

                        {/* 方案 4: 极客反色 */}
                        <div className="proposal-card">
                            <h3 className="font-bold mb-4 flex items-center gap-2">
                                <span className="w-6 h-6 rounded-full bg-zinc-200 text-black text-[10px] flex items-center justify-center">4</span>
                                极客反色 (Inverted Ink)
                            </h3>
                            <p className="text-xs text-zinc-500 mb-6 leading-relaxed">白色磨砂背景 + 炭黑色线条。极其稳定的显示方案，类似传统印刷品的质感，文字处理软件的首选。</p>
                            <div className="bg-black/40 p-8 rounded-xl flex justify-center">
                                <div className="w-24 h-24 bg-zinc-100 rounded-[22%] p-3 shadow-2xl border border-black/5">
                                    <OriginalPrismIcon scale={1} stroke="#1a1a1a" />
                                </div>
                            </div>
                            <div className="taskbar-preview"><div className="w-8 h-8 bg-white rounded p-1 shadow-lg border border-black/5"><OriginalPrismIcon scale={1} stroke="#222" /></div></div>
                        </div>

                        {/* 方案 5: 笔触增强 */}
                        <div className="proposal-card">
                            <h3 className="font-bold mb-4 flex items-center gap-2">
                                <span className="w-6 h-6 rounded-full bg-zinc-600 text-[10px] flex items-center justify-center">5</span>
                                笔触增强 (Stroke Reinforce)
                            </h3>
                            <p className="text-xs text-zinc-500 mb-6 leading-relaxed">依然使用深色背板，但将笔触加粗 80%（1.8px），这是在 32px 尺寸下依然能保持「精致细线感」的最均衡参数。</p>
                            <div className="bg-black/40 p-8 rounded-xl flex justify-center">
                                <div className="w-24 h-24 bg-zinc-900 rounded-[22%] p-3 shadow-2xl border border-white/10">
                                    <OriginalPrismIcon scale={1} strokeWidth={1.8} />
                                </div>
                            </div>
                            <div className="taskbar-preview"><div className="w-8 h-8 bg-zinc-900 rounded p-1 shadow-lg"><OriginalPrismIcon scale={1} strokeWidth={1.8} /></div></div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
