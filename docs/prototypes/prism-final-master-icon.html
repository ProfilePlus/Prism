<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism - Official Master Icon</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
        }

        body {
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .master-label {
            margin-bottom: 60px;
            text-align: center;
        }

        .master-label h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin: 0;
        }

        .master-label p {
            color: #888;
            font-size: 14px;
            margin-top: 8px;
        }

        /* --- THE FINAL MASTER ICON CODE --- */
        .monolith {
            width: 120px; 
            height: 160px; 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px; 
            transform: rotateY(-20deg) rotateX(10deg); 
            box-shadow: 20px 20px 50px rgba(0,0,0,0.15); 
            border: 1px solid rgba(255,255,255,0.3); 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            position: relative;
        }

        .refraction {
            position: absolute; 
            width: 200%; 
            height: 200%; 
            background: radial-gradient(circle at 30% 30%, #ec4899 0%, transparent 40%), radial-gradient(circle at 70% 70%, #3b82f6 0%, transparent 40%); 
            opacity: 0.6; 
            filter: blur(30px);
            z-index: 0;
        }

        .symbol-p {
            z-index: 1; 
            color: white; 
            font-family: "Times New Roman", Times, Baskerville, Georgia, serif;
            font-weight: 400; 
            font-size: 85px; 
            opacity: 0.85; 
            filter: drop-shadow(0 0 10px white);
            line-height: 1;
            transform: translateY(-2px);
            user-select: none;
        }

        .tag {
            margin-top: 40px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: #ec4899;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="master-label">
    <h1>Prism Master Design</h1>
    <p>Dichroic Monolith &middot; Modern Serif Edition</p>
</div>

<div class="monolith">
    <div class="refraction"></div>
    <div class="symbol-p">P</div>
</div>

<div class="tag">Final Approval State</div>

</body>
</html>
