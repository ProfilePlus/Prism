<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism - Final Icon Selection</title>
    <style>
        :root {
            --bg: #0c0c0e;
            --text: #ffffff;
        }

        [data-theme="light"] {
            --bg: #f5f5f7;
            --text: #000000;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 100px 20px;
            transition: background 0.6s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 80px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .options-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 60px;
            max-width: 1000px;
        }

        .option-card {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stage {
            width: 240px;
            height: 280px;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05), transparent 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 40px;
            margin-bottom: 24px;
        }

        /* --- The Fixed Monolith Architecture --- */
        .monolith {
            width: 120px;
            height: 160px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px;
            transform: rotateY(-20deg) rotateX(10deg);
            box-shadow: 20px 20px 50px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.3);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .dichroic-glow {
            position: absolute;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 30% 30%, #ec4899 0%, transparent 40%),
                radial-gradient(circle at 70% 70%, #3b82f6 0%, transparent 40%);
            opacity: 0.7;
            filter: blur(30px);
            z-index: 0;
        }

        .symbol-p {
            z-index: 1;
            color: white;
            font-weight: 800;
            opacity: 0.9;
            filter: drop-shadow(0 0 15px white);
            line-height: 1;
            transform: translateY(-2px);
        }

        .label {
            font-size: 14px;
            font-weight: 600;
            color: #888;
            margin-top: 12px;
        }

        .tweaks {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: #fff;
            color: #000;
            padding: 12px 24px;
            border-radius: 100px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Final Candidate: Optimized v2-01</h1>
    <p>Preserving the original refraction logic with maximized branding scale.</p>
</div>

<div class="options-container">

    <!-- Option A: Large (80px) -->
    <div class="option-card">
        <div class="stage">
            <div class="monolith">
                <div class="dichroic-glow"></div>
                <div class="symbol-p" style="font-size: 80px;">P</div>
            </div>
        </div>
        <div class="label">Balance Scale (80px)</div>
    </div>

    <!-- Option B: XL (95px) -->
    <div class="option-card">
        <div class="stage">
            <div class="monolith">
                <div class="dichroic-glow"></div>
                <div class="symbol-p" style="font-size: 95px;">P</div>
            </div>
        </div>
        <div class="label">Impact Scale (95px)</div>
    </div>

    <!-- Option C: XXL (110px) -->
    <div class="option-card">
        <div class="stage">
            <div class="monolith">
                <div class="dichroic-glow"></div>
                <div class="symbol-p" style="font-size: 110px; opacity: 0.95;">P</div>
            </div>
        </div>
        <div class="label">Maximum Scale (110px)</div>
    </div>

</div>

<div class="tweaks" id="theme-toggle">Switch Environment</div>

<script>
    const themeToggle = document.getElementById('theme-toggle');
    const root = document.documentElement;
    themeToggle.addEventListener('click', () => {
        const isDark = root.getAttribute('data-theme') !== 'light';
        root.setAttribute('data-theme', isDark ? 'light' : 'dark');
    });
</script>

</body>
</html>
