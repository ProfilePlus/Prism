<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism - Airy v2-01 Collection</title>
    <style>
        :root {
            --bg: #0c0c0e;
        }

        body {
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 100px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 80px;
            color: #888;
        }

        .header h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
        }

        .stage {
            width: 240px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Using a cleaner stage to let the glass speak */
        }

        /* --- PURE v2-01 ARCHITECTURE --- */
        .monolith {
            width: 120px;
            height: 160px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px;
            transform: rotateY(-20deg) rotateX(10deg);
            box-shadow: 20px 20px 50px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Internal Refraction - Exact v2-01 Code */
        .refraction {
            position: absolute;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 30% 30%, #ec4899 0%, transparent 40%), 
                radial-gradient(circle at 70% 70%, #3b82f6 0%, transparent 40%);
            opacity: 0.6;
            filter: blur(30px);
            z-index: 0;
        }

        .symbol-p {
            z-index: 1;
            color: white;
            font-weight: 800;
            opacity: 0.8;
            filter: drop-shadow(0 0 10px white);
            line-height: 1;
        }

        .label {
            margin-top: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Prism: The Airy v2-01 Refinement</h1>
    <p>Restoring the original refraction logic and transparency balance.</p>
</div>

<div class="grid">

    <!-- Option 1: v2-01 Original (40px) -->
    <div class="container">
        <div class="stage">
            <div class="monolith">
                <div class="refraction"></div>
                <div class="symbol-p" style="font-size: 40px;">P</div>
            </div>
        </div>
        <div class="label">Original v2-01 (40px)</div>
    </div>

    <!-- Option 2: Refined Airy (60px) -->
    <div class="container">
        <div class="stage">
            <div class="monolith">
                <div class="refraction"></div>
                <div class="symbol-p" style="font-size: 60px;">P</div>
            </div>
        </div>
        <div class="label">Medium Growth (60px)</div>
    </div>

    <!-- Option 3: Refined Airy (75px) -->
    <div class="container">
        <div class="stage">
            <div class="monolith">
                <div class="refraction"></div>
                <div class="symbol-p" style="font-size: 75px;">P</div>
            </div>
        </div>
        <div class="label">Max Breathing Scale (75px)</div>
    </div>

</div>

</body>
</html>
