<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism - Final Master Icon (Dev Monospace)</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --p-color: #ffffff;
        }

        [data-theme="dark"] {
            --bg: #0c0c0e;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 80px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.6s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 80px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin: 0 0 12px 0;
        }

        .master-stage {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 60px;
            max-width: 800px;
        }

        .preview-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(128,128,128,0.05);
            padding: 40px;
            border-radius: 32px;
            border: 1px solid rgba(128,128,128,0.1);
        }

        /* --- THE MASTER ICON SPECIFICATION --- */
        .monolith {
            width: 120px; 
            height: 160px; 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px; 
            transform: rotateY(-20deg) rotateX(10deg); 
            box-shadow: 20px 20px 50px rgba(0,0,0,0.15); 
            border: 1px solid rgba(255,255,255,0.3); 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            position: relative;
        }

        .refraction {
            position: absolute; 
            width: 200%; 
            height: 200%; 
            background: 
                radial-gradient(circle at 30% 30%, #ec4899 0%, transparent 40%), 
                radial-gradient(circle at 70% 70%, #3b82f6 0%, transparent 40%); 
            opacity: 0.6; 
            filter: blur(30px);
            z-index: 0;
        }

        .symbol-p {
            z-index: 1; 
            color: var(--p-color); 
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-weight: 600; 
            font-size: 78px; 
            opacity: 0.85; 
            filter: drop-shadow(0 0 10px white);
            line-height: 1;
            transform: translateY(-2px);
            user-select: none;
        }

        .label {
            margin-top: 24px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #888;
        }

        .tweaks {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: #111;
            color: white;
            padding: 12px 24px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Prism Official Icon</h1>
    <p>Theme: Airy Monolith &middot; Font: Dev Monospace</p>
</div>

<div class="master-stage">

    <!-- Light Mode Preview -->
    <div class="preview-card" style="background: #f0f0f2;">
        <div class="monolith">
            <div class="refraction"></div>
            <div class="symbol-p">P</div>
        </div>
        <div class="label">Light Context</div>
    </div>

    <!-- Dark Mode Preview -->
    <div class="preview-card" style="background: #121214;">
        <div class="monolith">
            <div class="refraction"></div>
            <div class="symbol-p">P</div>
        </div>
        <div class="label">Dark Context</div>
    </div>

</div>

<div class="tweaks" id="theme-toggle">Switch System Theme</div>

<script>
    const themeToggle = document.getElementById('theme-toggle');
    const root = document.documentElement;
    themeToggle.addEventListener('click', () => {
        const isDark = root.getAttribute('data-theme') === 'dark';
        root.setAttribute('data-theme', isDark ? 'light' : 'dark');
    });
</script>

</body>
</html>
