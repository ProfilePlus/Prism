<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prism MiaoYan-Inspired Custom SVG Icons</title>
  <style>
    :root {
      --paper: #f7f7f4;
      --panel: rgba(255, 255, 255, 0.86);
      --canvas: #ffffff;
      --ink: #20201d;
      --muted: #74746e;
      --hairline: rgba(0, 0, 0, 0.1);
      --blue: #2377ff;
      --green: #1c5d33;
      --shadow: 0 22px 54px rgba(22, 22, 18, 0.12);
      color: var(--ink);
      background: var(--paper);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% -12%, rgba(255,255,255,0.98), rgba(255,255,255,0.18) 46%, transparent 62%),
        var(--paper);
    }
    button { font: inherit; }

    .page {
      width: min(1220px, calc(100vw - 48px));
      margin: 0 auto;
      padding: 42px 0 58px;
    }

    .intro {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 650;
      letter-spacing: 0;
    }

    .brief {
      margin: 0;
      max-width: 850px;
      color: #676760;
      font-size: 14px;
      line-height: 1.8;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      height: 28px;
      padding: 0 12px;
      border: 1px solid var(--hairline);
      border-radius: 999px;
      color: #5f5f58;
      background: rgba(255,255,255,0.72);
      font-size: 12px;
      white-space: nowrap;
    }

    .grammar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 0 0 24px;
    }

    .grammar span {
      min-height: 42px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 10px;
      background: rgba(255,255,255,0.62);
      color: #62625b;
      font-size: 12px;
      line-height: 1.55;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      --accent: var(--blue);
      --idle: #85857f;
      --smallIcon: 18px;
      --largeIcon: 31px;
      --gap: 8px;
      overflow: hidden;
      border: 1px solid var(--hairline);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.78);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .card:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 36%, rgba(0,0,0,0.12));
      box-shadow: var(--shadow);
    }

    .cardHeader {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: baseline;
      padding: 16px 18px 12px;
    }

    .name {
      margin: 0;
      font-size: 15px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .note {
      max-width: 260px;
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      text-align: right;
    }

    .mockWindow {
      margin: 0 14px 14px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 10px;
      background: var(--canvas);
    }

    .titlebar {
      height: 30px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      background: #fbfbfa;
    }

    .traffic {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      display: block;
    }

    .redDot { background: #ff5f57; }
    .yellowDot { background: #ffbd2e; }
    .greenDot { background: #28c840; }

    .title {
      min-width: 0;
      flex: 1;
      color: #242421;
      font-size: 12px;
      letter-spacing: 0.7px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .modeGroup,
    .largeGroup {
      display: flex;
      align-items: center;
      gap: var(--gap);
      color: var(--idle);
    }

    .modeButton,
    .largeButton {
      display: grid;
      place-items: center;
      border: 0;
      padding: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
    }

    .modeButton {
      width: 23px;
      height: 23px;
    }

    .largeButton {
      width: 40px;
      height: 40px;
      border-radius: 9px;
      background: rgba(0,0,0,0.025);
    }

    .modeButton.active,
    .largeButton.active { color: var(--accent); }

    .softActive .modeButton.active,
    .softActive .largeButton.active {
      background: transparent;
    }

    svg {
      display: block;
      width: var(--smallIcon);
      height: var(--smallIcon);
      fill: currentColor;
      stroke: none;
      transform: translateY(0.5px);
    }

    .largeButton svg {
      width: var(--largeIcon);
      height: var(--largeIcon);
      transform: none;
    }

    .bodyPreview {
      height: 94px;
      display: grid;
      grid-template-columns: 118px 1fr;
      background: #fff;
    }

    .side {
      padding: 12px 14px;
      border-right: 1px solid rgba(0,0,0,0.07);
      background: #f5f5f3;
    }

    .pill,
    .sideLine,
    .textLine,
    .heading { border-radius: 999px; }

    .pill {
      height: 22px;
      margin-bottom: 12px;
      background: #d9d9d5;
    }

    .sideLine {
      height: 6px;
      margin-bottom: 8px;
      background: rgba(0,0,0,0.1);
    }

    .sideLine:nth-child(3) { width: 70%; }
    .sideLine:nth-child(4) { width: 88%; }

    .doc { padding: 16px 24px; }

    .heading {
      width: 44%;
      height: 9px;
      margin-bottom: 18px;
      background: #7b3fc5;
    }

    .textLine {
      height: 7px;
      margin-bottom: 9px;
      background: rgba(0,0,0,0.12);
    }

    .textLine:nth-child(2) { width: 64%; }
    .textLine:nth-child(3) { width: 82%; }
    .textLine:nth-child(4) { width: 54%; }

    .zoom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 18px 16px;
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    .largeGroup { gap: calc(var(--gap) + 7px); }

    .labels {
      display: flex;
      gap: 8px;
      color: #777771;
      font-size: 12px;
    }

    .labels span {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: #f0f0ed;
    }

    .v1 { --accent: #2377ff; --idle: #7c817a; }
    .v2 { --accent: #1c5d33; --idle: #7d7d76; }
    .v3 { --accent: #7356c8; --idle: #858080; }
    .v4 { --accent: #235c89; --idle: #7d8282; }
    .v5 { --accent: #7b3f2c; --idle: #7f7970; }
    .v6 { --accent: #404040; --idle: #777; }
    .v7 { --accent: #1b7482; --idle: #808783; }
    .v8 { --accent: #8f2f25; --idle: #8a8178; }
    .v9 { --accent: #4f5f25; --idle: #828277; }
    .v10 { --accent: #111; --idle: #777; }

    @media (max-width: 900px) {
      .page { width: min(100vw - 28px, 620px); padding-top: 26px; }
      .intro { grid-template-columns: 1fr; align-items: start; }
      .grammar { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .note { text-align: left; }
      .cardHeader { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="intro">
      <div>
        <h1>Prism Paper 图标最终方案</h1>
        <p class="brief">已选定 01 方案，并把颜色规则收敛清楚：图标本身永远是 template glyph，不自带颜色；未选中统一灰色，只有当前模式进入激活态时才变成主题色。下面只展示 01 方案在不同选中状态下的表现。</p>
      </div>
      <span class="chip">01 selected · inactive gray / active tint</span>
    </section>

    <section class="grammar">
      <span>20x20 画布，图形主体控制在 15-17px 内</span>
      <span>不用描边 outline，用填充体块模拟圆润线条</span>
      <span>边角和内孔都偏圆，避免尖锐科技感</span>
      <span>未选中灰色；选中才使用主题 tint</span>
    </section>

    <section class="grid" id="grid"></section>
  </main>

    const options = [
      { key: 'v1', className: 'v1', activeMode: 'split', name: '01 · 分栏选中', note: '默认状态。分栏为当前模式，编辑和预览保持灰色' },
      { key: 'v1', className: 'v1', activeMode: 'edit', name: '01 · 编辑选中', note: '编辑为当前模式，另外两个图标不带颜色' },
      { key: 'v1', className: 'v1', activeMode: 'preview', name: '01 · 预览选中', note: '预览为当前模式，只让眼睛图标变成主题色' },
      { key: 'v1', className: 'v1', activeMode: 'none', name: '01 · 未选中基准', note: '全部未激活时统一灰色，用来检查图标本体是否干净' }
    ];

    function renderButtons(option, large = false) {
      return modes.map((mode) => `
        <button class="${large ? 'largeButton' : 'modeButton'} ${option.activeMode === mode.key ? 'active' : ''}" data-mode="${mode.key}" aria-label="${mode.label}">
          ${glyphs[option.key][mode.key]}
        </button>
      `).join('');
    }

    function renderCard(option) {
      return `
        <article class="card ${option.className}">
          <div class="cardHeader">
            <h2 class="name">${option.name}</h2>
            <p class="note">${option.note}</p>
          </div>
          <div class="mockWindow">
            <div class="titlebar">
              <div class="traffic"><i class="dot redDot"></i><i class="dot yellowDot"></i><i class="dot greenDot"></i></div>
              <div class="title">TESTING_CHECKLIST.md</div>
              <div class="modeGroup">${renderButtons(option)}</div>
            </div>
            <div class="bodyPreview">
              <div class="side"><div class="pill"></div><div class="sideLine"></div><div class="sideLine"></div></div>
              <div class="doc"><div class="heading"></div><div class="textLine"></div><div class="textLine"></div><div class="textLine"></div></div>
            </div>
          </div>
          <div class="zoom">
            <div class="largeGroup">${renderButtons(option, true)}</div>
            <div class="labels"><span>编辑</span><span>分栏</span><span>预览</span></div>
          </div>
        </article>
      `;
    }

    const grid = document.getElementById('grid');
    grid.innerHTML = options.map(renderCard).join('');

    grid.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-mode]');
      if (!button) return;
      const card = button.closest('.card');
      const mode = button.dataset.mode;
      card.querySelectorAll('button[data-mode]').forEach((candidate) => {
        candidate.classList.toggle('active', candidate.dataset.mode === mode);
      });
    });
  </script>
