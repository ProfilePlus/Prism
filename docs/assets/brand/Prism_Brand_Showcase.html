<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism Brand Showcase - High Fidelity Animation</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        .canvas { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #000; }
        
        /* 玻璃拟态 */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .rainbow-ray {
            position: absolute;
            height: 2px;
            filter: blur(1px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 核心动效引擎简版 (基于 huashu-design animations.jsx 逻辑) ---
        const useTime = () => {
            const [time, setTime] = useState(0);
            useEffect(() => {
                let start = performance.now();
                const frame = (now) => {
                    setTime((now - start) / 1000);
                    requestAnimationFrame(frame);
                };
                requestAnimationFrame(frame);
                window.__ready = true; // 告诉录屏脚本可以开始了
            }, []);
            return time;
        };

        const interpolate = (val, start, end, from, to) => {
            if (val < start) return from;
            if (val > end) return to;
            const p = (val - start) / (end - start);
            return from + (to - from) * p;
        };

        const expoOut = (p) => 1 - Math.pow(2, -10 * p);

        // --- 组件区 ---

        const PrismIcon = ({ t }) => {
            const scale = interpolate(t, 2, 3, 2, 0.2);
            const x = interpolate(t, 2, 3, 50, 5);
            const y = interpolate(t, 2, 3, 50, 5);
            const opacity = interpolate(t, 0.5, 1, 0, 1);
            const rotate = interpolate(t, 0, 10, 0, 180);

            return (
                <div style={{
                    position: 'absolute',
                    left: `${x}%`,
                    top: `${y}%`,
                    transform: `translate(-50%, -50%) scale(${scale}) rotate(${rotate}deg)`,
                    opacity: opacity,
                    width: 400,
                    height: 400
                }}>
                    <svg viewBox="0 0 100 100" fill="none">
                        <g stroke="white" strokeWidth="1.2" strokeLinecap="round">
                            {[0, 60, 120, 180, 240, 300].map(deg => (
                                <path 
                                    key={deg} 
                                    d="M50 50 L50 20 L70 35 Z" 
                                    transform={`rotate(${deg} 50 50)`} 
                                    style={{
                                        strokeDasharray: 100,
                                        strokeDashoffset: interpolate(t, 1, 2, 100, 0),
                                        opacity: interpolate(t, 1, 2, 0, 1)
                                    }}
                                />
                            ))}
                        </g>
                        <circle cx="50" cy="50" r="10" fill="white" opacity={interpolate(t, 2, 2.5, 0, 0.1)} />
                    </svg>
                </div>
            );
        };

        const Sidebar = ({ t }) => {
            const width = interpolate(t, 3, 4, 0, 400);
            const opacity = interpolate(t, 3, 3.5, 0, 1);
            
            return (
                <div className="glass h-full p-12 flex flex-col gap-6" style={{ width, opacity, position: 'absolute', left: 0, top: 0 }}>
                    <div className="text-zinc-500 text-xs font-bold tracking-widest mb-4">WORKSPACE</div>
                    {[1, 2, 3, 4, 5].map(i => (
                        <div key={i} style={{ 
                            height: 12, 
                            width: interpolate(t, 3.5 + i*0.1, 4 + i*0.1, 0, i % 2 === 0 ? 120 : 180),
                            background: 'rgba(255,255,255,0.2)',
                            borderRadius: 2,
                            opacity: interpolate(t, 3.5 + i*0.1, 4, 0, 1)
                        }} />
                    ))}
                </div>
            );
        };

        const Editor = ({ t }) => {
            const x = interpolate(t, 4, 5, 500, 480);
            const opacity = interpolate(t, 4.5, 5.5, 0, 1);
            
            return (
                <div style={{ position: 'absolute', left: x, top: 120, opacity, width: 1000 }}>
                    <h1 className="text-5xl font-bold mb-12 tracking-tight">Prism: The Essence of Writing.</h1>
                    <div className="flex flex-col gap-6">
                        {[1, 2, 3].map(i => (
                            <div key={i} className="text-xl text-zinc-400 leading-relaxed max-w-2xl" style={{
                                opacity: interpolate(t, 5.5 + i*0.3, 6.5 + i*0.3, 0, 1),
                                transform: `translateY(${interpolate(t, 5.5 + i*0.3, 6.5 + i*0.3, 20, 0)}px)`
                            }}>
                                {i === 1 && "Markdown is not just syntax. It's a way to structure thought without friction."}
                                {i === 2 && "Light travels through a prism and reveals its hidden colors."}
                                {i === 3 && "We build tools that reveal your hidden stories."}
                            </div>
                        ))}
                    </div>
                    {/* 光标模拟 */}
                    <div style={{
                        width: 2, height: 28, background: '#3b82f6', marginTop: 24,
                        opacity: Math.sin(t * 10) > 0 ? 1 : 0
                    }} />
                </div>
            );
        };

        const App = () => {
            const t = useTime();

            return (
                <div className="canvas">
                    {/* 背景光谱线 */}
                    {t < 3 && [0, 1, 2, 3, 4, 5].map(i => (
                        <div 
                            key={i} 
                            className="rainbow-ray" 
                            style={{
                                width: interpolate(t, 0.5, 2, 0, 1000),
                                left: '50%', top: '50%',
                                background: `linear-gradient(90deg, transparent, hsl(${i * 60}, 80%, 50%), transparent)`,
                                transform: `rotate(${i * 60 + t * 20}deg) translateX(${interpolate(t, 0.5, 2, 0, 200)}px)`,
                                opacity: interpolate(t, 0.5, 1.5, 0, 0.4) * interpolate(t, 2, 3, 1, 0)
                            }}
                        />
                    ))}

                    <Sidebar t={t} />
                    <Editor t={t} />
                    <PrismIcon t={t} />

                    {/* 水印 */}
                    <div style={{
                        position: 'absolute', bottom: 48, right: 64,
                        fontSize: 14, color: 'rgba(255,255,255,0.2)',
                        letterSpacing: '0.2em', fontFamily: 'monospace'
                    }}>
                        CREATED BY HUASHU-DESIGN
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
