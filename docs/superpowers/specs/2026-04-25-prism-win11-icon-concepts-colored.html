<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism Win11 Icon Color Concepts</title>
    <style>
        :root {
            color-scheme: light;
            --page: #f2f0ec;
            --surface: rgba(255, 255, 255, 0.76);
            --surface-strong: #ffffff;
            --surface-soft: rgba(255, 255, 255, 0.52);
            --text: #22211f;
            --muted: #68645d;
            --quiet: #8d887f;
            --line: rgba(31, 35, 40, 0.1);
            --shadow-1: 0 16px 42px rgba(45, 42, 37, 0.1), 0 2px 7px rgba(45, 42, 37, 0.05);
            --shadow-2: 0 8px 20px rgba(45, 42, 37, 0.1), 0 1px 3px rgba(45, 42, 37, 0.08);
            --focus: #7a5a2f;
            --radius-card: 8px;
            --radius-control: 8px;
            --ease: cubic-bezier(.2, .8, .2, 1);
        }

        [data-theme="dark"] {
            color-scheme: dark;
            --page: #191918;
            --surface: rgba(40, 40, 38, 0.84);
            --surface-strong: #292927;
            --surface-soft: rgba(52, 51, 48, 0.56);
            --text: #f5f2ec;
            --muted: #cac3b8;
            --quiet: #9e978c;
            --line: rgba(255, 255, 255, 0.11);
            --shadow-1: 0 20px 54px rgba(0, 0, 0, 0.36), 0 2px 8px rgba(0, 0, 0, 0.24);
            --shadow-2: 0 10px 26px rgba(0, 0, 0, 0.32), 0 1px 4px rgba(0, 0, 0, 0.26);
            --focus: #d5a65f;
        }

        * {
            box-sizing: border-box;
        }

        html {
            background: var(--page);
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--text);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0) 280px),
                var(--page);
            font-family: "Segoe UI Variable Display", "Segoe UI Variable", "Segoe UI", sans-serif;
            font-size: 15px;
            line-height: 1.45;
            text-wrap: pretty;
        }

        [data-theme="dark"] body {
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0) 300px),
                var(--page);
        }

        button,
        input {
            font: inherit;
        }

        .page {
            width: min(1760px, calc(100% - 40px));
            margin: 0 auto;
            padding: 30px 0 42px;
        }

        .topbar {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
        }

        .eyebrow {
            margin: 0 0 6px;
            color: var(--quiet);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 650;
            letter-spacing: 0;
        }

        .subtitle {
            max-width: 760px;
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 15px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }

        .segmented {
            display: inline-grid;
            grid-auto-flow: column;
            gap: 3px;
            padding: 4px;
            border: 1px solid var(--line);
            border-radius: var(--radius-control);
            background: var(--surface-soft);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.42);
        }

        .segmented button {
            min-width: 44px;
            height: 32px;
            padding: 0 12px;
            border: 0;
            border-radius: 6px;
            color: var(--muted);
            background: transparent;
            cursor: pointer;
            transition: background 160ms var(--ease), color 160ms var(--ease), box-shadow 160ms var(--ease);
        }

        .segmented button:hover,
        .segmented button:focus-visible {
            color: var(--text);
            outline: none;
        }

        .segmented button.is-active {
            color: var(--text);
            background: var(--surface-strong);
            box-shadow: var(--shadow-2);
        }

        .taskbar {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 18px;
            align-items: center;
            min-height: 72px;
            margin-bottom: 20px;
            padding: 14px 18px;
            border: 1px solid var(--line);
            border-radius: var(--radius-card);
            background: var(--surface);
            box-shadow: var(--shadow-1);
            backdrop-filter: blur(18px);
        }

        .taskbar-title {
            display: grid;
            gap: 2px;
        }

        .taskbar-title strong {
            font-size: 14px;
            font-weight: 650;
        }

        .taskbar-title span {
            color: var(--quiet);
            font-size: 12px;
        }

        .taskbar-icons {
            display: flex;
            justify-content: center;
            gap: 18px;
            min-width: 0;
        }

        .taskbar-icon {
            position: relative;
            display: grid;
            place-items: center;
            width: 42px;
            height: 42px;
            border: 1px solid transparent;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            transition: transform 160ms var(--ease), background 160ms var(--ease), border-color 160ms var(--ease);
        }

        .taskbar-icon:hover,
        .taskbar-icon:focus-visible {
            transform: translateY(-2px);
            border-color: var(--line);
            background: rgba(255, 255, 255, 0.42);
            outline: none;
        }

        [data-theme="dark"] .taskbar-icon:hover,
        [data-theme="dark"] .taskbar-icon:focus-visible {
            background: rgba(255, 255, 255, 0.08);
        }

        .taskbar-icon.is-selected {
            border-color: rgba(37, 99, 235, 0.34);
            background: rgba(37, 99, 235, 0.12);
        }

        .taskbar-icon.is-selected::after {
            content: "";
            position: absolute;
            width: 18px;
            height: 3px;
            margin-top: 40px;
            border-radius: 999px;
            background: var(--focus);
        }

        .taskbar-icon svg {
            width: 38px;
            height: 38px;
        }

        .metric {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--quiet);
            font-size: 12px;
            white-space: nowrap;
        }

        .metric::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.12);
        }

        .concept-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(220px, 1fr));
            gap: 16px;
        }

        .concept {
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 16px;
            min-width: 0;
            padding: 16px;
            border: 1px solid var(--line);
            border-radius: var(--radius-card);
            background: var(--surface);
            box-shadow: var(--shadow-1);
            backdrop-filter: blur(18px);
            cursor: pointer;
            transition: transform 180ms var(--ease), border-color 180ms var(--ease), box-shadow 180ms var(--ease);
        }

        .concept:hover,
        .concept:focus-within,
        .concept.is-selected {
            transform: translateY(-3px);
            border-color: rgba(37, 99, 235, 0.36);
            box-shadow: 0 24px 60px rgba(24, 32, 44, 0.14), 0 2px 8px rgba(24, 32, 44, 0.08);
        }

        [data-theme="dark"] .concept:hover,
        [data-theme="dark"] .concept:focus-within,
        [data-theme="dark"] .concept.is-selected {
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.48), 0 2px 8px rgba(0, 0, 0, 0.28);
        }

        .concept-head {
            display: grid;
            gap: 6px;
        }

        .concept-index {
            color: var(--quiet);
            font-size: 12px;
            font-weight: 650;
        }

        .concept h2 {
            margin: 0;
            font-size: 16px;
            font-weight: 650;
            letter-spacing: 0;
        }

        .concept p {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
        }

        .palette {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-top: 2px;
        }

        .swatch {
            width: 22px;
            height: 10px;
            border: 1px solid rgba(31, 35, 40, 0.16);
            border-radius: 999px;
            background: var(--swatch);
        }

        [data-theme="dark"] .swatch {
            border-color: rgba(255, 255, 255, 0.18);
        }

        .stage {
            display: grid;
            place-items: center;
            min-height: 292px;
            border: 1px solid var(--line);
            border-radius: var(--radius-card);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.34)),
                linear-gradient(135deg, rgba(222, 227, 234, 0.5), rgba(255, 255, 255, 0.2));
            overflow: hidden;
        }

        [data-theme="dark"] .stage {
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)),
                linear-gradient(135deg, rgba(91, 98, 111, 0.22), rgba(255, 255, 255, 0.02));
        }

        [data-bg="dark"] .stage {
            background: #23262d;
        }

        [data-bg="clear"] .stage {
            background:
                linear-gradient(45deg, rgba(145, 153, 164, 0.18) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(145, 153, 164, 0.18) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, rgba(145, 153, 164, 0.18) 75%),
                linear-gradient(-45deg, transparent 75%, rgba(145, 153, 164, 0.18) 75%),
                var(--surface-strong);
            background-position: 0 0, 0 12px, 12px -12px, -12px 0;
            background-size: 24px 24px;
        }

        .icon-large {
            width: 236px;
            height: 236px;
            overflow: visible;
        }

        .previews {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
        }

        .sizes {
            display: flex;
            align-items: end;
            gap: 12px;
            min-width: 0;
        }

        .size-sample {
            display: grid;
            gap: 6px;
            justify-items: center;
            color: var(--quiet);
            font-size: 11px;
        }

        .size-sample svg {
            display: block;
        }

        .pick {
            min-width: 74px;
            height: 34px;
            border: 1px solid var(--line);
            border-radius: var(--radius-control);
            color: var(--text);
            background: var(--surface-strong);
            cursor: pointer;
            transition: transform 140ms var(--ease), border-color 140ms var(--ease), background 140ms var(--ease);
        }

        .pick:hover,
        .pick:focus-visible {
            transform: translateY(-1px);
            border-color: rgba(37, 99, 235, 0.42);
            outline: none;
        }

        .concept.is-selected .pick {
            border-color: rgba(37, 99, 235, 0.42);
            background: rgba(37, 99, 235, 0.12);
        }

        .notes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 18px;
        }

        .note {
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: var(--radius-card);
            color: var(--muted);
            background: var(--surface-soft);
            font-size: 13px;
        }

        .note strong {
            display: block;
            margin-bottom: 3px;
            color: var(--text);
            font-size: 13px;
        }

        .icon-svg {
            overflow: visible;
            shape-rendering: geometricPrecision;
        }

        @media (max-width: 1320px) {
            .concept-grid {
                grid-template-columns: repeat(2, minmax(280px, 1fr));
            }

            .concept:last-child {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 760px) {
            .page {
                width: min(100% - 24px, 560px);
                padding-top: 18px;
            }

            .topbar,
            .taskbar,
            .notes {
                grid-template-columns: 1fr;
            }

            .toolbar {
                justify-content: flex-start;
            }

            .taskbar-icons {
                justify-content: flex-start;
                overflow-x: auto;
                padding-bottom: 4px;
            }

            .concept-grid {
                grid-template-columns: 1fr;
            }

            .concept:last-child {
                grid-column: auto;
            }

            .stage {
                min-height: 252px;
            }

            .icon-large {
                width: 210px;
                height: 210px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                transition-duration: 1ms !important;
                animation-duration: 1ms !important;
                animation-iteration-count: 1 !important;
            }
        }
    </style>
</head>

    <script>
        const iconConcepts = [
            {
                id: "light-slit",
                template: "icon-light-slit",
                title: "纸面光隙",
                description: "从“编辑时纸面被光切开”的瞬间出发，安静但有一条强记忆点。",
                palette: ["#FFF7E8", "#B88D66", "#4AA58F", "#BD4B34", "#26466F"]
            },
            {
                id: "reading-aperture",
                template: "icon-reading-aperture",
                title: "阅读孔径",
                description: "像镜头光圈，也像读者的视线；把预览、聚焦和折射合成一个圆形符号。",
                palette: ["#D9E8C2", "#7B985D", "#B74931", "#D2A04E", "#183428"]
            },
            {
                id: "editor-compass",
                template: "icon-editor-compass",
                title: "编辑罗盘",
                description: "把写作工具想象成建筑师的三角尺，强调结构、校准和专业感。",
                palette: ["#B9CFDB", "#345A74", "#13283F", "#D6A34F", "#A74637"]
            },
            {
                id: "bookmark-orbit",
                template: "icon-bookmark-orbit",
                title: "书签轨迹",
                description: "一条书签像轨道绕过页面，动态一点，适合更有生命力的 Prism。",
                palette: ["#FFF0D4", "#A94737", "#D8A24F", "#688D66", "#1F3527"]
            },
            {
                id: "black-ice-cursor",
                template: "icon-black-ice-cursor",
                title: "黑冰光标",
                description: "更激进的开发者工具方向：黑色晶体、负形光标和一小块暖色反差。",
                palette: ["#0B0D12", "#202737", "#315B91", "#6FB7B5", "#EAB85E"]
            }
        ];

        const conceptGrid = document.querySelector("#conceptGrid");
        const taskbarIcons = document.querySelector("#taskbarIcons");

        function cloneIcon(templateId, className, size) {
            const template = document.querySelector(`#${templateId}`);
            const icon = template.content.firstElementChild.cloneNode(true);
            const suffix = `${templateId}-${Math.random().toString(36).slice(2)}`;
            const idMap = new Map();
            icon.querySelectorAll("[id]").forEach((node) => {
                const oldId = node.id;
                const newId = `${oldId}-${suffix}`;
                idMap.set(oldId, newId);
                node.id = newId;
            });
            icon.querySelectorAll("*").forEach((node) => {
                Array.from(node.attributes).forEach((attribute) => {
                    let value = attribute.value;
                    idMap.forEach((newId, oldId) => {
                        value = value.replaceAll(`url(#${oldId})`, `url(#${newId})`);
                        value = value.replaceAll(`#${oldId}`, `#${newId}`);
                    });
                    if (value !== attribute.value) {
                        node.setAttribute(attribute.name, value);
                    }
                });
            });
            if (className) {
                icon.classList.add(className);
            }
            if (size) {
                icon.style.width = `${size}px`;
                icon.style.height = `${size}px`;
            }
            return icon;
        }

        function setSelected(id) {
            document.querySelectorAll("[data-concept]").forEach((element) => {
                element.classList.toggle("is-selected", element.dataset.concept === id);
            });
        }

        iconConcepts.forEach((concept, index) => {
            const card = document.createElement("article");
            card.className = "concept";
            card.tabIndex = 0;
            card.dataset.concept = concept.id;
            card.innerHTML = `
                <div class="concept-head">
                    <div class="concept-index">方案 ${String(index + 1).padStart(2, "0")}</div>
                    <h2>${concept.title}</h2>
                    <p>${concept.description}</p>
                    <div class="palette" aria-label="${concept.title} 色板">
                        ${concept.palette.map((color) => `<span class="swatch" style="--swatch: ${color}"></span>`).join("")}
                    </div>
                </div>
                <div class="stage" aria-hidden="true"></div>
                <div class="previews">
                    <div class="sizes">
                        <div class="size-sample" data-size="48"><span>48</span></div>
                        <div class="size-sample" data-size="32"><span>32</span></div>
                        <div class="size-sample" data-size="24"><span>24</span></div>
                    </div>
                    <button class="pick" type="button">选择</button>
                </div>
            `;

            card.querySelector(".stage").appendChild(cloneIcon(concept.template, "icon-large"));
            card.querySelectorAll(".size-sample").forEach((sample) => {
                sample.prepend(cloneIcon(concept.template, "", Number(sample.dataset.size)));
            });
            card.addEventListener("click", () => setSelected(concept.id));
            card.addEventListener("keydown", (event) => {
                if (event.key === "Enter" || event.key === " ") {
                    event.preventDefault();
                    setSelected(concept.id);
                }
            });
            conceptGrid.appendChild(card);

            const taskbarButton = document.createElement("button");
            taskbarButton.className = "taskbar-icon";
            taskbarButton.type = "button";
            taskbarButton.title = concept.title;
            taskbarButton.dataset.concept = concept.id;
            taskbarButton.appendChild(cloneIcon(concept.template, "", 32));
            taskbarButton.addEventListener("click", () => setSelected(concept.id));
            taskbarIcons.appendChild(taskbarButton);
        });

        setSelected("light-slit");

        document.querySelectorAll("[data-bg-choice]").forEach((button) => {
            button.addEventListener("click", () => {
                document.body.dataset.bg = button.dataset.bgChoice;
                document.querySelectorAll("[data-bg-choice]").forEach((item) => {
                    item.classList.toggle("is-active", item === button);
                });
            });
        });

        document.querySelectorAll("[data-theme-choice]").forEach((button) => {
            button.addEventListener("click", () => {
                document.body.dataset.theme = button.dataset.themeChoice;
                document.querySelectorAll("[data-theme-choice]").forEach((item) => {
                    item.classList.toggle("is-active", item === button);
                });
            });
        });
    </script>
</body>
</html>
