<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prism Status Bar Icon Options</title>
  <style>
    :root {
      --paper: #f7f7f4;
      --panel: rgba(255, 255, 255, 0.86);
      --canvas: #ffffff;
      --ink: #20201d;
      --muted: #6d6d66;
      --idle: #7c817a;
      --accent: #2377ff;
      --hairline: rgba(0, 0, 0, 0.1);
      --shadow: 0 22px 54px rgba(22, 22, 18, 0.12);
      color: var(--ink);
      background: var(--paper);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% -12%, rgba(255,255,255,0.98), rgba(255,255,255,0.22) 46%, transparent 62%),
        var(--paper);
    }

    button { font: inherit; }

    .page {
      width: min(1260px, calc(100vw - 48px));
      margin: 0 auto;
      padding: 42px 0 58px;
    }

    .intro {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 650;
      letter-spacing: 0;
    }

    .brief {
      margin: 0;
      max-width: 880px;
      color: #676760;
      font-size: 14px;
      line-height: 1.8;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      height: 28px;
      padding: 0 12px;
      border: 1px solid var(--hairline);
      border-radius: 999px;
      color: #5f5f58;
      background: rgba(255,255,255,0.72);
      font-size: 12px;
      white-space: nowrap;
    }

    .grammar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 0 0 24px;
    }

    .grammar span {
      min-height: 42px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 10px;
      background: rgba(255,255,255,0.62);
      color: #62625b;
      font-size: 12px;
      line-height: 1.55;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      --largeIcon: 31px;
      --smallIcon: 14px;
      overflow: hidden;
      border: 1px solid var(--hairline);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.78);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .card:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 36%, rgba(0,0,0,0.12));
      box-shadow: var(--shadow);
    }

    .cardHeader {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: baseline;
      padding: 16px 18px 12px;
    }

    .name {
      margin: 0;
      font-size: 15px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .note {
      max-width: 280px;
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      text-align: right;
    }

    .mockWindow {
      margin: 0 14px 14px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 10px;
      background: var(--canvas);
    }

    .content {
      height: 120px;
      display: grid;
      grid-template-columns: 150px 1fr;
      background: #fff;
    }

    .side {
      padding: 14px 14px;
      border-right: 1px solid rgba(0,0,0,0.07);
      background: #f5f5f3;
    }

    .pill,
    .sideLine,
    .textLine,
    .heading {
      border-radius: 999px;
    }

    .pill {
      height: 22px;
      margin-bottom: 12px;
      background: #d9d9d5;
    }

    .sideLine {
      height: 6px;
      margin-bottom: 8px;
      background: rgba(0,0,0,0.1);
    }

    .sideLine:nth-child(3) { width: 70%; }
    .sideLine:nth-child(4) { width: 88%; }

    .doc { padding: 18px 28px; }

    .heading {
      width: 42%;
      height: 9px;
      margin-bottom: 18px;
      background: #2377ff;
    }

    .textLine {
      height: 7px;
      margin-bottom: 9px;
      background: rgba(0,0,0,0.12);
    }

    .textLine:nth-child(2) { width: 64%; }
    .textLine:nth-child(3) { width: 82%; }
    .textLine:nth-child(4) { width: 54%; }

    .statusbar {
      height: 26px;
      display: flex;
      align-items: stretch;
      border-top: 1px solid rgba(0,0,0,0.1);
      background: #f5f5f2;
      color: var(--idle);
      font-size: 11px;
      letter-spacing: 0.6px;
      user-select: none;
    }

    .sidebarZone {
      width: 150px;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 7px;
      border-right: 1px solid rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .folder {
      flex: 1;
      min-width: 0;
      text-align: center;
      color: #777771;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 7px;
      min-width: 0;
      position: relative;
    }

    .left,
    .right,
    .iconRow,
    .largeGroup {
      display: flex;
      align-items: center;
    }

    .left,
    .right {
      gap: 6px;
    }

    .right {
      margin-left: auto;
    }

    .center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 4px;
      color: #74746e;
      white-space: nowrap;
      pointer-events: none;
    }

    .sep {
      width: 1px;
      height: 10px;
      margin: 0 2px;
      background: rgba(0,0,0,0.1);
    }

    .iconButton {
      width: 20px;
      height: 19px;
      display: grid;
      place-items: center;
      border: 0;
      padding: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--idle);
      cursor: pointer;
    }

    .iconButton:hover {
      background: rgba(0,0,0,0.045);
      color: #2a2a26;
    }

    .iconButton.active {
      color: var(--accent);
      background: transparent;
    }

    svg {
      display: block;
      width: var(--smallIcon);
      height: var(--smallIcon);
      fill: currentColor;
      stroke: none;
    }

    .zoom {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 12px 18px 16px;
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    .largeGroup {
      gap: 13px;
      color: var(--idle);
    }

    .largeButton {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border: 0;
      padding: 0;
      border-radius: 9px;
      background: rgba(0,0,0,0.025);
      color: inherit;
    }

    .largeButton.active { color: var(--accent); }

    .largeButton svg {
      width: var(--largeIcon);
      height: var(--largeIcon);
    }

    .labels {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      max-width: 210px;
      color: #777771;
      font-size: 12px;
    }

    .labels span {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: #f0f0ed;
      white-space: nowrap;
    }

    .v1 { --accent: #2377ff; --idle: #7c817a; }
    .v2 { --accent: #2377ff; --idle: #7f827d; }
    .v3 { --accent: #2377ff; --idle: #797e79; }
    .v4 { --accent: #2377ff; --idle: #81817b; }
    .v5 { --accent: #2377ff; --idle: #797f83; }
    .v6 { --accent: #2377ff; --idle: #7c7c77; }
    .v7 { --accent: #2377ff; --idle: #788078; }
    .v8 { --accent: #2377ff; --idle: #7e7c82; }
    .v9 { --accent: #2377ff; --idle: #767f83; }
    .v10 { --accent: #2377ff; --idle: #7d7d78; }

    @media (max-width: 980px) {
      .page { width: min(100vw - 28px, 680px); padding-top: 26px; }
      .intro { grid-template-columns: 1fr; align-items: start; }
      .grammar { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .cardHeader { grid-template-columns: 1fr; }
      .note { text-align: left; }
      .zoom { grid-template-columns: 1fr; }
      .labels { justify-content: flex-start; max-width: none; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="intro">
      <div>
        <h1>Prism 底部状态栏图标方案</h1>
        <p class="brief">沿用标题栏 01 的自绘 template glyph 语言：20x20 画布、填充式圆润笔画、未选中灰色、激活态才使用主题色。每组都覆盖状态栏里的新建、侧栏收起/展开、文档树/列表、专注、导出。</p>
      </div>
      <span class="chip">10 options · template glyph</span>
    </section>

    <section class="grammar">
      <span>真实状态栏预览使用 26px 高度，图标落在 20x19px 按钮里</span>
      <span>图标不自带彩色；选中、hover、主题色全部由 CSS token 决定</span>
      <span>每套包含互斥状态：收起/展开、树/列表，避免落地时风格断裂</span>
      <span>放大区只用于看路径性格，最终以状态栏小尺寸识别度为准</span>
    </section>

    <section class="grid" id="grid"></section>
  </main>

    const options = [
      { key: 'v1', name: '01 · Paper Utility', note: '最贴近标题栏 01：轻、圆、安静，小尺寸下识别最稳。' },
      { key: 'v2', name: '02 · Soft Capsule', note: '更多圆角容器和胶囊感，状态栏显得更温和。' },
      { key: 'v3', name: '03 · Document Native', note: '强调文档与面板语义，和 Markdown 编辑器身份更强绑定。' },
      { key: 'v4', name: '04 · Panel Split', note: '更像布局控制器，侧栏、树、列表的结构感更明确。' },
      { key: 'v5', name: '05 · Rounded Solid', note: '体块更重，按钮小的时候很清楚，但存在感也更强。' },
      { key: 'v6', name: '06 · Compact AppKit', note: '偏 macOS 工具栏：边框矩形、收放箭头克制，落地风险低。' },
      { key: 'v7', name: '07 · Quiet Rails', note: '加入竖轨和列表节奏，适合底栏这种线性空间。' },
      { key: 'v8', name: '08 · Tile System', note: '用磁贴表达树/列表/专注，视觉更有系统性。' },
      { key: 'v9', name: '09 · Sidebar Mark', note: '侧栏控制更像真实面板，树/列表差异更明显。' },
      { key: 'v10', name: '10 · MiaoYan Dense', note: '更厚一点的妙言式密度，保守但很耐看。' }
    ];

    function icon(key, id, className = 'iconButton') {
      return `<button class="${className}" data-icon="${id}" aria-label="${labels.find(([k]) => k === id)?.[1] || id}">${glyphs[key][id]}</button>`;
    }

    function renderCard(option, index) {
      const active = index % 2 === 0 ? 'focus' : 'tree';
      return `
        <article class="card ${option.key}">
          <div class="cardHeader">
            <h2 class="name">${option.name}</h2>
            <p class="note">${option.note}</p>
          </div>
          <div class="mockWindow">
            <div class="content">
              <div class="side"><div class="pill"></div><div class="sideLine"></div><div class="sideLine"></div></div>
              <div class="doc"><div class="heading"></div><div class="textLine"></div><div class="textLine"></div><div class="textLine"></div></div>
            </div>
            <div class="statusbar">
              <div class="sidebarZone">
                ${icon(option.key, 'new')}
                <span class="folder">docs</span>
                ${icon(option.key, 'tree', active === 'tree' ? 'iconButton active' : 'iconButton')}
              </div>
              <div class="main">
                <div class="left">${icon(option.key, 'collapse')}</div>
                <div class="center"><span>已保存</span><span class="sep"></span><span>1280 词</span><span class="sep"></span><span>LN 24</span><span class="sep"></span><span>COL 12</span></div>
                <div class="right">
                  ${icon(option.key, 'focus', active === 'focus' ? 'iconButton active' : 'iconButton')}
                  ${icon(option.key, 'export')}
                </div>
              </div>
            </div>
          </div>
          <div class="zoom">
            <div class="largeGroup">
              ${labels.map(([id]) => icon(option.key, id, `largeButton ${id === active ? 'active' : ''}`)).join('')}
            </div>
            <div class="labels">${labels.map(([, label]) => `<span>${label}</span>`).join('')}</div>
          </div>
        </article>
      `;
    }

    const grid = document.getElementById('grid');
    grid.innerHTML = options.map(renderCard).join('');

    grid.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-icon]');
      if (!button) return;
      const card = button.closest('.card');
      const id = button.dataset.icon;
      card.querySelectorAll('button[data-icon]').forEach((candidate) => {
        candidate.classList.toggle('active', candidate.dataset.icon === id);
      });
    });
  </script>
